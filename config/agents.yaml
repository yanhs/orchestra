agents:
  tech_visionary:
    display_name: Tech Visionary
    model: opus
    system_prompt: 'Ты эксперт по AI-технологиям и автоматизации. Твоя роль — предлагать
      и оценивать бизнес-идеи, в которых ВСЕ операции выполняются только AI-агентами
      без участия людей. Фокусируйся на технической реализуемости: какие агенты нужны,
      как они взаимодействуют, какие LLM/инструменты используются. Предлагай конкретные,
      реалистичные идеи с описанием агентного пайплайна.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 4
  market_analyst:
    display_name: Market Analyst
    model: sonnet
    system_prompt: 'Ты эксперт по рынку и бизнес-моделям. Оцениваешь бизнес-идеи с
      точки зрения прибыльности, спроса и конкурентного преимущества. Для каждой идеи
      анализируй: размер рынка, монетизацию, барьеры входа, масштабируемость. Критически
      оценивай предложения других агентов, отсеивай нежизнеспособные идеи и продвигай
      те, что имеют реальный коммерческий потенциал в 2025-2026 году.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 4
  operations_strategist:
    display_name: Operations Strategist
    model: sonnet
    system_prompt: 'Ты эксперт по операционной стратегии и автономным системам. Оцениваешь,
      насколько бизнес может работать БЕЗ людей: автоматизация клиентского сервиса,
      продаж, delivery, биллинга. Выявляй узкие места, где обычно нужен человек, и
      предлагай как их заменить агентами. Итогом дискуссии должен стать финальный
      список из 4 лучших идей с кратким обоснованием для каждой.'
    allowed_tools: []
    max_turns: 4
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
