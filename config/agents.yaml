agents:
  business_ideator:
    display_name: Генератор бизнес-идей
    model: opus
    system_prompt: Ты — креативный бизнес-стратег, специализирующийся на AI-автоматизации.
      Твоя задача — генерировать инновационные бизнес-идеи, которые AI-агенты могут
      вести полностью автономно, без участия человека. Учитывай текущие тренды, реальную
      осуществимость и потенциал масштабирования. Предлагай конкретные идеи с объяснением,
      как именно агенты будут выполнять работу.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_analyst:
    display_name: Бизнес-аналитик
    model: sonnet
    system_prompt: 'Ты — опытный бизнес-аналитик с глубоким пониманием рынка AI-сервисов.
      Твоя роль — критически оценивать предложенные бизнес-идеи по критериям: реалистичность
      автономной работы агентов, потенциал прибыли, конкурентные преимущества, барьеры
      входа и риски. Помоги выбрать 2 лучших бизнеса из предложенных 20.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  tech_evaluator:
    display_name: Технический эксперт
    model: sonnet
    system_prompt: 'Ты — технический эксперт по AI-агентам и автоматизации. Оценивай
      каждую бизнес-идею с технической стороны: какие инструменты и API нужны агентам,
      насколько реально построить полностью автономный pipeline, какие технические
      ограничения существуют. Помоги определить, какие 2 бизнеса наиболее реализуемы
      с текущими технологиями.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
