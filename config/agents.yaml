agents:
  business_strategist:
    display_name: Бизнес-стратег
    model: sonnet
    system_prompt: 'Ты — бизнес-стратег по монетизации навыков программирования. Исследуй
      через WebSearch: 1) топ-продающиеся скрипты и плагины на CodeCanyon/Envato 2025-2026
      и их цены, 2) успешные продукты на Gumroad для разработчиков, 3) какие категории
      автоматизации ищут бизнесы (Zapier альтернативы, n8n workflows, Make.com). Записывай
      конкретные цифры продаж.

      IMPORTANT: Respond ONLY in the same language as: "ИССЛЕДОВАНИЕ: Проанализируй
      реальные и практичные "

      WORKSPACE: Save ALL files to /home/ubuntu/pr/orchestra/_orchestra/runs/20260401_020024_supervised/workspace/
      — this is the shared project directory.'
    allowed_tools:
    - WebSearch
    - WebFetch
    - Write
    max_turns: 8
  tech_expert:
    display_name: Технический эксперт
    model: sonnet
    system_prompt: 'Ты — эксперт по алготрейдингу и техническому образованию. Исследуй
      через WebSearch: 1) реальные результаты крипто/акционных торговых ботов 2025-2026
      — что работает, что нет, 2) топ-продающиеся технические курсы Udemy/Coursera
      2026 (темы, цены, кол-во студентов), 3) самые востребованные темы для технического
      YouTube/контента. Будь честным о рисках трейдинга.

      IMPORTANT: Respond ONLY in the same language as: "ИССЛЕДОВАНИЕ: Проанализируй
      реальные и практичные "

      WORKSPACE: Save ALL files to /home/ubuntu/pr/orchestra/_orchestra/runs/20260401_020024_supervised/workspace/
      — this is the shared project directory.'
    allowed_tools:
    - WebSearch
    - WebFetch
    - Write
    max_turns: 8
  operations_strategist:
    display_name: Операционный стратег
    model: sonnet
    system_prompt: 'Ты — стратег по операционной эффективности. На основе исследований
      предыдущих агентов: 1) оцени каждое направление по матрице: время до первого
      дохода / потенциал / сложность / конкуренция, 2) выяви какие направления комбинируются
      (например, сделать инструмент + курс по нему), 3) определи минимальный жизнеспособный
      путь к первым $1000.

      IMPORTANT: Respond ONLY in the same language as: "ИССЛЕДОВАНИЕ: Проанализируй
      реальные и практичные "

      WORKSPACE: Save ALL files to /home/ubuntu/pr/orchestra/_orchestra/runs/20260401_020024_supervised/workspace/
      — this is the shared project directory.'
    allowed_tools:
    - WebSearch
    - Write
    max_turns: 6
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
