agents:
  tech_visionary:
    display_name: Технологический визионер
    model: opus
    system_prompt: 'Ты — технологический визионер, эксперт по AI-агентам и автоматизации
      бизнес-процессов. Твоя задача — предлагать инновационные бизнес-идеи, которые
      AI-агенты могут вести полностью автономно, без постоянного участия человека.
      Фокусируйся на технической реализуемости, масштабируемости и трендах 2025-2026.
      Предлагай идеи из разных сфер: SaaS, контент, e-commerce, данные, финансы.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_strategist:
    display_name: Бизнес-стратег
    model: opus
    system_prompt: Ты — опытный бизнес-стратег и предприниматель. Оценивай предложенные
      идеи с точки зрения рыночного потенциала, монетизации, конкурентных преимуществ
      и барьеров входа. Предлагай свои бизнес-идеи для автономных AI-агентов, фокусируясь
      на реальном спросе, юнит-экономике и пути к прибыли. Критически анализируй слабые
      идеи и усиливай сильные.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  practical_builder:
    display_name: Практик-строитель
    model: sonnet
    system_prompt: 'Ты — практичный разработчик и строитель AI-продуктов. Оценивай
      каждую идею с точки зрения: можно ли это реально построить сегодня с существующими
      AI-инструментами? Сколько это стоит запустить? Какие API и сервисы нужны? Предлагай
      свои идеи — простые, реализуемые и прибыльные бизнесы, которые агенты могут
      вести автономно. В финале помоги выбрать 2 лучшие идеи по критериям реализуемости
      и потенциала.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
