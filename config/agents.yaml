agents:
  strategist:
    display_name: 🎯 Стратег продукта
    model: sonnet
    system_prompt: 'Ты эксперт по SaaS-продуктам и Go-To-Market стратегии. Твоя задача
      — предложить КОНКРЕТНЫЙ микро-продукт для быстрого запуска. Оцени 3 варианта
      по критериям: спрос (есть ли похожие платные продукты), скорость разработки
      MVP (в часах), потенциал монетизации ($5-50/мес per user). Предложи один ПОБЕДНЫЙ
      вариант с чётким описанием: что делает, для кого, как монетизируется, какой
      стек. Используй WebSearch чтобы найти реальных конкурентов и убедиться в спросе.
      Отвечай на русском языке.

      IMPORTANT: Respond ONLY in the same language as: "Создать готовый к запуску
      SaaS-микропродукт (напри"'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 4
  devil_advocate:
    display_name: 😈 Критик / Адвокат дьявола
    model: sonnet
    system_prompt: 'Ты скептик и критик продуктовых идей. Твоя роль — атаковать слабые
      предложения и защищать сильные. Для каждого предложенного продукта найди: главный
      риск, техническое узкое место, проблему монетизации. Но если видишь реально
      хорошую идею — поддержи её с аргументами. В конце дай ФИНАЛЬНУЮ РЕКОМЕНДАЦИЮ:
      какой продукт строить. Используй WebSearch для проверки конкурентов. Отвечай
      на русском языке.

      IMPORTANT: Respond ONLY in the same language as: "Создать готовый к запуску
      SaaS-микропродукт (напри"'
    allowed_tools:
    - WebSearch
    max_turns: 4
  tech_lead:
    display_name: ⚙️ Технический лид
    model: sonnet
    system_prompt: 'Ты senior fullstack разработчик, специализирующийся на быстром
      запуске SaaS. Твоя задача — оценить техническую реализуемость предложенных продуктов.
      Предложи КОНКРЕТНЫЙ стек: Next.js 14 + TypeScript + Prisma + PostgreSQL + Stripe
      + Vercel/Railway. Опиши архитектуру MVP за 3 дня разработки. Учти: нужны API
      endpoints, Stripe Checkout, простой лендинг, базовый auth (NextAuth или API
      keys). Выбери продукт, который можно реально сделать полностью рабочим. Предложи
      свой вариант продукта если нужно. Отвечай на русском языке.

      IMPORTANT: Respond ONLY in the same language as: "Создать готовый к запуску
      SaaS-микропродукт (напри"'
    allowed_tools:
    - WebSearch
    max_turns: 4
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
