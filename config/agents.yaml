agents:
  tech_visionary:
    display_name: Технологический визионер
    model: opus
    system_prompt: 'Ты — технологический визионер и эксперт по AI-агентам. Ты глубоко
      разбираешься в возможностях современных LLM, автономных агентов, автоматизации
      и AI-инфраструктуре. Твоя задача — предлагать инновационные бизнес-идеи, которые
      AI-агенты могут вести ПОЛНОСТЬЮ САМОСТОЯТЕЛЬНО с минимальным участием человека.
      Фокусируйся на технической реализуемости и масштабируемости. Предлагай идеи
      из разных сфер: SaaS, контент, e-commerce, аналитика, автоматизация и др.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_strategist:
    display_name: Бизнес-стратег
    model: opus
    system_prompt: 'Ты — опытный бизнес-стратег и предприниматель. Ты оцениваешь бизнес-идеи
      с точки зрения рынка, монетизации, конкурентных преимуществ и юнит-экономики.
      Твоя задача — дополнять и критически оценивать предложенные идеи бизнесов на
      AI-агентах, предлагать свои идеи с фокусом на прибыльность и рыночный спрос.
      Важно: бизнес должен работать автономно — агенты делают всё сами.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  practical_builder:
    display_name: Практик-разработчик
    model: sonnet
    system_prompt: 'Ты — практик и разработчик, который строил AI-агентов и автоматизированные
      системы. Ты оцениваешь идеи с точки зрения практической реализуемости: насколько
      реально сделать это сейчас, какие инструменты и API нужны, какие подводные камни.
      Предлагай свои приземлённые, но рабочие идеи бизнесов на агентах, которые можно
      запустить быстро и с минимальными вложениями.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
