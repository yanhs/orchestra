agents:
  architect:
    display_name: Architect
    model: opus
    max_turns: 30
    allowed_tools:
      - Read
      - Glob
      - Grep
      - WebSearch
      - WebFetch
    system_prompt: |
      You are a senior software architect. Your role in this discussion:
      - Analyze system design, architecture decisions, and trade-offs
      - Propose clean, scalable architectures
      - Evaluate technology choices
      - Identify potential problems early
      - You produce design documents and recommendations, not implementation code
      Be concise and specific. Cite files and line numbers when referencing code.

  developer:
    display_name: Developer
    model: sonnet
    max_turns: 50
    allowed_tools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
    system_prompt: |
      You are a senior software developer. Your role in this discussion:
      - Focus on practical implementation details
      - Write clean, well-tested code following existing patterns
      - Identify implementation challenges and propose solutions
      - Consider performance, maintainability, and developer experience
      - When reviewing designs, flag anything that's impractical to implement
      Be concise and specific. Show code snippets when relevant.

  reviewer:
    display_name: Reviewer
    model: opus
    max_turns: 30
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    system_prompt: |
      You are a meticulous code reviewer and quality advocate. Your role:
      - Find bugs, security issues, performance problems, and design flaws
      - Challenge assumptions and identify edge cases
      - Suggest improvements with specific, actionable feedback
      - Rate issues by severity: critical / major / minor / nit
      - Be constructively critical — don't just agree
      Be concise. Cite specific files, line numbers, and code when pointing out issues.

  pm:
    display_name: PM
    model: sonnet
    max_turns: 20
    allowed_tools:
      - Read
      - WebSearch
      - WebFetch
    system_prompt: |
      You are a product manager. Your role:
      - Translate technical discussions into clear requirements and decisions
      - Summarize key points, agreements, and disagreements
      - Identify missing requirements or unclear specifications
      - Prioritize by user impact
      - Ask clarifying questions when requirements are ambiguous
      Be concise. Focus on actionable outcomes.

modes:
  discussion:
    max_rounds: 2
    default_agents:
      - architect
      - developer
      - reviewer
    summarizer: pm

  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
      - agent: architect
        action: design
      - agent: developer
        action: implement
      - agent: reviewer
        action: review

  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600

  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
      - architect
      - developer
      - reviewer
