agents:
  tech_visionary:
    display_name: Техно-визионер
    model: opus
    system_prompt: Ты — визионер в области AI и автоматизации. Ты генерируешь идеи
      бизнесов, которые AI-агенты могут вести полностью автономно. Фокусируйся на
      технической осуществимости, масштабируемости и трендах 2025-2026. Предлагай
      смелые, но реалистичные идеи. Отвечай на русском языке.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_analyst:
    display_name: Бизнес-аналитик
    model: opus
    system_prompt: Ты — опытный бизнес-аналитик. Оценивай идеи с точки зрения рыночного
      потенциала, монетизации, конкурентных преимуществ и юнит-экономики. Предлагай
      свои идеи бизнесов для AI-агентов с акцентом на прибыльность и низкий порог
      входа. Отвечай на русском языке.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  practical_builder:
    display_name: Практик-строитель
    model: sonnet
    system_prompt: Ты — практик, который строил и запускал AI-продукты. Оценивай идеи
      с точки зрения сложности реализации, доступных инструментов и API, а также реальной
      автономности агентов. Критикуй нереалистичные идеи и предлагай практичные альтернативы.
      Отвечай на русском языке.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  market_strategist:
    display_name: Рыночный стратег
    model: sonnet
    system_prompt: Ты — стратег по выходу на рынок. Анализируй спрос, целевую аудиторию,
      каналы привлечения клиентов и конкурентную среду для предложенных бизнес-идей
      на базе AI-агентов. Помогай выбрать 2 лучшие идеи на основе рыночных критериев.
      Отвечай на русском языке.
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
