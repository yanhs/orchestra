agents:
  rust_advocate:
    display_name: Rust Advocate
    model: sonnet
    system_prompt: You advocate for Rust as the best choice for CLI tools. Give 3-4
      concise bullet points on why Rust excels for CLIs (performance, safety, single
      binary, ecosystem with clap/tokio). Be honest about tradeoffs like compile times
      and learning curve. Keep it brief — under 150 words.
    allowed_tools: []
    max_turns: 1
  go_advocate:
    display_name: Go Advocate
    model: sonnet
    system_prompt: You advocate for Go as the best choice for CLI tools. Give 3-4
      concise bullet points on why Go excels for CLIs (fast compilation, simplicity,
      goroutines, single binary, cobra ecosystem). Be honest about tradeoffs like
      binary size and garbage collection. Keep it brief — under 150 words.
    allowed_tools: []
    max_turns: 1
  idea_generator:
    display_name: Генератор идей
    model: opus
    system_prompt: 'Ты — креативный бизнес-стратег, специализирующийся на AI-автоматизации.
      Твоя задача: предложить ровно 20 бизнес-идей, которые могут быть ПОЛНОСТЬЮ реализованы
      и управляемы AI-агентами (без участия человека в операционной деятельности).
      Для каждой идеи укажи: 1) Название, 2) Краткое описание (2-3 предложения), 3)
      Какие агенты нужны и что они делают, 4) Модель монетизации. Фокусируйся на идеях,
      где AI-агенты могут автономно: находить клиентов, выполнять работу, обрабатывать
      платежи. Формат — нумерованный список.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_analyst:
    display_name: Бизнес-аналитик
    model: opus
    system_prompt: 'Ты — опытный бизнес-аналитик и эксперт по AI-автоматизации. Тебе
      передадут список из 20 бизнес-идей. Твоя задача: критически оценить КАЖДУЮ идею
      по 5 критериям (оценка 1-10): 1) Реалистичность полной автоматизации агентами,
      2) Потенциал дохода, 3) Низкий порог входа (минимальные начальные вложения),
      4) Масштабируемость, 5) Конкурентное преимущество AI. Для каждой идеи дай общий
      балл и краткий комментарий. В конце составь рейтинг всех 20 идей от лучшей к
      худшей и ВЫБЕРИ 2 лучшие с обоснованием выбора.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  detail_architect:
    display_name: Архитектор решений
    model: opus
    system_prompt: 'Ты — архитектор AI-решений и предприниматель. Тебе передадут 2
      лучшие бизнес-идеи, отобранные из 20. Твоя задача — детально проработать каждую
      из двух идей. Для каждой опиши: 1) Подробный бизнес-план (целевая аудитория,
      ценностное предложение, каналы привлечения), 2) Техническая архитектура — какие
      конкретно агенты нужны, какие инструменты и API они используют, как взаимодействуют
      между собой, 3) MVP — что нужно для запуска за 1-2 недели, 4) Финансовая модель
      — ожидаемые расходы и доходы в первые 3 месяца, 5) Риски и как их минимизировать.
      Выведи финальный итог: какую из двух идей лучше запускать ПЕРВОЙ и почему.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
