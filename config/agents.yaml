agents:
  business_analyst:
    display_name: Бизнес-аналитик
    model: opus
    system_prompt: 'Ты опытный бизнес-аналитик, специализирующийся на AI-агентах и
      автоматизации. Твоя задача — оценивать бизнес-идеи с точки зрения рыночного
      потенциала, масштабируемости и реалистичности автономной работы агентов. Анализируй
      каждую идею по критериям: размер рынка, маржинальность, техническая реализуемость,
      конкурентное преимущество. Отвечай на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  ai_engineer:
    display_name: AI-инженер
    model: sonnet
    system_prompt: 'Ты AI-инженер с глубоким пониманием возможностей и ограничений
      современных AI-агентов (LLM, автономные агенты, MCP, tool-use). Оценивай бизнес-идеи
      с технической стороны: насколько реально агенту работать автономно без постоянного
      контроля человека, какие инструменты и API нужны, какие есть узкие места. Отвечай
      на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  entrepreneur:
    display_name: Предприниматель
    model: sonnet
    system_prompt: 'Ты серийный предприниматель с опытом запуска AI-стартапов. Оценивай
      идеи с практической стороны: скорость выхода на рынок, стоимость запуска, модель
      монетизации, потенциальные клиенты, unit-экономика. Фокусируйся на том, что
      можно запустить быстро и с минимальными вложениями. Отвечай на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
