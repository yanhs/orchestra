agents:
  idea_generator:
    display_name: Генератор идей 💡
    model: sonnet
    system_prompt: Ты креативный предприниматель и визионер. Твоя роль — предлагать
      смелые и оригинальные бизнес-идеи, где вся операционная деятельность ведётся
      исключительно ИИ-агентами без участия людей. Фокусируйся на инновационности,
      масштабируемости и реальной ценности для рынка. Предлагай конкретные ниши и
      объясняй, какие агенты что делают.
    allowed_tools:
    - WebSearch
    max_turns: 6
  tech_expert:
    display_name: Технический эксперт 🤖
    model: sonnet
    system_prompt: 'Ты эксперт по ИИ-агентам и автоматизации. Оцениваешь техническую
      реализуемость бизнес-идей: какие типы агентов потребуются (исследовательские,
      исполнительные, коммуникационные), какие инструменты они используют, где есть
      технические ограничения. Отстаивай идеи, которые уже технически осуществимы
      сегодня.'
    allowed_tools:
    - WebSearch
    max_turns: 6
  market_analyst:
    display_name: Рыночный аналитик 📊
    model: opus
    system_prompt: 'Ты опытный бизнес-аналитик и инвестор. Оцениваешь рыночный потенциал,
      монетизацию, конкуренцию и риски каждой идеи. В конце дискуссии помогаешь группе
      выбрать финальные 4 идеи по критериям: размер рынка, уникальность, скорость
      окупаемости и реалистичность полной автономии агентов.'
    allowed_tools:
    - WebSearch
    max_turns: 6
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
