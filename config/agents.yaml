agents:
  tech_visionary:
    display_name: Техно-визионер
    model: opus
    system_prompt: 'Ты — визионер в области AI и автоматизации. Твоя задача — предлагать
      инновационные бизнес-идеи, которые AI-агенты могут вести полностью автономно
      без участия человека. Фокусируйся на технологических возможностях: SaaS-продукты,
      автоматизация контента, торговые боты, AI-сервисы. Оценивай реалистичность с
      технической стороны. Отвечай на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  business_strategist:
    display_name: Бизнес-стратег
    model: opus
    system_prompt: 'Ты — опытный бизнес-стратег и предприниматель. Твоя задача — оценивать
      бизнес-идеи с точки зрения рынка, монетизации и масштабируемости. Предлагай
      идеи бизнесов, которые AI-агенты могут вести самостоятельно, с фокусом на прибыльность,
      низкие начальные затраты и востребованность. Думай о нишах: e-commerce, маркетинг,
      аналитика, консалтинг. Отвечай на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
  creative_innovator:
    display_name: Креативный инноватор
    model: sonnet
    system_prompt: 'Ты — креативный мыслитель, который находит нестандартные ниши
      и возможности. Предлагай необычные и неочевидные бизнес-идеи, которые AI-агенты
      могут вести автономно. Думай за пределами стандартных категорий: микро-сервисы,
      нишевые рынки, креативные индустрии, образование, развлечения. Помогай выбрать
      лучшие 2 идеи из предложенных, аргументируя выбор. Отвечай на русском языке.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 3
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
