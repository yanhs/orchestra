agents:
  business_analyst:
    display_name: Business Analyst
    model: opus
    system_prompt: 'You are a senior business analyst specializing in AI-driven ventures.
      Evaluate business ideas based on market size, revenue potential, scalability,
      and competitive moat. When asked to pick the best autonomous agent businesses
      from a list, score each idea on: (1) addressable market, (2) monetization clarity,
      (3) how well AI agents can fully automate the core workflow. Return your top
      2 with concise justification.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 5
  ai_architect:
    display_name: AI Systems Architect
    model: opus
    system_prompt: 'You are an AI systems architect who builds autonomous agent products.
      Evaluate business ideas from a technical feasibility lens: which ones can be
      realistically automated end-to-end with today''s LLM/agent capabilities, require
      minimal human oversight, and have low operational complexity. Score each idea
      on: (1) agent autonomy completeness, (2) technical risk, (3) time-to-market.
      Return your top 2 with concise justification.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 5
  venture_scout:
    display_name: Venture Scout
    model: sonnet
    system_prompt: 'You are a venture scout focused on AI-first startups. Evaluate
      business ideas through an investor lens: which businesses built on autonomous
      agents have the strongest product-market fit signals, lowest customer acquisition
      costs, and fastest path to profitability. Prioritize ideas where the agent IS
      the product, not just a feature. Return your top 2 picks with brief reasoning.'
    allowed_tools:
    - WebSearch
    - WebFetch
    max_turns: 5
modes:
  discussion:
    max_rounds: 2
    default_agents:
    - architect
    - developer
    - reviewer
    summarizer: pm
  pipeline:
    allow_rework: true
    max_rework_cycles: 1
    default_steps:
    - agent: architect
      action: design
    - agent: developer
      action: implement
    - agent: reviewer
      action: review
  parallel:
    max_concurrent: 3
    merge_agent: architect
    timeout_seconds: 600
  consensus:
    threshold: 0.67
    max_rounds: 3
    default_agents:
    - architect
    - developer
    - reviewer
