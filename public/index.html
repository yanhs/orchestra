<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Orchestra</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--s:#111113;--s2:#18181b;--s3:#1e1e22;--b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);--t:#e4e4e7;--d:#71717a;--d2:#a1a1aa;--a:#818cf8;--ad:rgba(129,140,248,0.12);--g:#4ade80;--y:#fbbf24;--r:#f87171;--bl:#60a5fa;--p:#c084fc;--o:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}

.hdr{padding:0.5rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:0.8rem;background:var(--s);flex-shrink:0}
.hdr h1{font-size:0.9rem;font-weight:600} .hdr h1 span{color:var(--a)}
.hdr .st{margin-left:auto;font-size:0.68rem;color:var(--d);font-family:'JetBrains Mono',monospace}
.hdr-btn{padding:0.2rem 0.55rem;font-size:0.68rem;background:var(--s2);border:1px solid var(--b);border-radius:4px;cursor:pointer;color:var(--d2);transition:all .12s}
.hdr-btn:hover{border-color:var(--a);color:var(--a)} .hdr-btn.on{background:var(--ad);border-color:var(--a);color:var(--a)}

.lay{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sb{width:300px;min-width:300px;border-right:1px solid var(--b);display:flex;flex-direction:column;background:var(--s);overflow-y:auto}
.sec{padding:0.7rem 0.8rem;border-bottom:1px solid var(--b)}
.sec-t{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--d);margin-bottom:0.4rem;display:flex;align-items:center;gap:0.4rem}
.sec-t .act{margin-left:auto;font-size:0.6rem;color:var(--a);cursor:pointer;font-weight:500}
.sec-t .act:hover{text-decoration:underline}

/* Modes */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem}
.mbtn{padding:0.35rem;font-size:0.72rem;font-weight:500;background:var(--s2);border:1px solid var(--b);border-radius:4px;cursor:pointer;color:var(--d2);text-align:center;transition:all .12s}
.mbtn:hover{border-color:var(--b2);color:var(--t)} .mbtn.on{background:var(--ad);border-color:var(--a);color:var(--a)}

/* Agent chips */
.ag-grid{display:flex;flex-wrap:wrap;gap:0.3rem}
.ag-c{padding:0.25rem 0.5rem;font-size:0.7rem;background:var(--s2);border:1px solid var(--b);border-radius:4px;cursor:pointer;color:var(--d2);transition:all .12s;display:flex;align-items:center;gap:0.25rem;position:relative}
.ag-c:hover{border-color:var(--b2)} .ag-c.sel{background:var(--ad);border-color:var(--a);color:var(--a)}
.ag-c .mt{font-size:0.55rem;color:var(--d);font-family:'JetBrains Mono',monospace}
.ag-c .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ag-c .dot.off{background:#3f3f46} .ag-c .dot.working{background:var(--y);box-shadow:0 0 4px rgba(251,191,36,0.5);animation:pulse 1.5s infinite} .ag-c .dot.idle{background:var(--g)}
.ag-c .edit-ic{display:none;font-size:0.6rem;color:var(--d);margin-left:2px;cursor:pointer}
.ag-c:hover .edit-ic{display:inline}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ag-new{padding:0.25rem 0.5rem;font-size:0.7rem;background:transparent;border:1px dashed var(--b2);border-radius:4px;cursor:pointer;color:var(--d);transition:all .12s}
.ag-new:hover{border-color:var(--a);color:var(--a)}

/* Config bar */
.cfg-bar{display:flex;gap:0.3rem;align-items:center;flex-wrap:wrap}
.cfg-bar select{padding:0.25rem 0.4rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.7rem;font-family:inherit;min-width:100px}
.cfg-bar select:focus{outline:none;border-color:var(--a)}
.cfg-bar .sm{padding:0.2rem 0.45rem;font-size:0.65rem;background:var(--s2);border:1px solid var(--b);border-radius:3px;cursor:pointer;color:var(--d2)}
.cfg-bar .sm:hover{border-color:var(--a);color:var(--a)}

/* Options */
.opts{padding:0 0.8rem 0.7rem;display:none}
.orow{display:flex;gap:0.25rem;margin-bottom:0.25rem;align-items:center}
.orow select,.orow input{padding:0.25rem 0.4rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.7rem;font-family:inherit}
.orow select{min-width:80px} .orow input{flex:1}
.orow select:focus,.orow input:focus{outline:none;border-color:var(--a)}
.xbtn{padding:0.15rem 0.35rem;font-size:0.65rem;background:var(--s2);border:1px solid var(--b);border-radius:3px;cursor:pointer;color:var(--d2)}
.xbtn:hover{border-color:var(--r);color:var(--r)}
.abtn{padding:0.15rem 0.4rem;font-size:0.65rem;background:var(--s2);border:1px solid var(--b);border-radius:3px;cursor:pointer;color:var(--d2)}
.abtn:hover{border-color:var(--a);color:var(--a)}

/* Topic */
.top-area{padding:0.7rem 0.8rem;display:flex;flex-direction:column;gap:0.4rem;border-top:1px solid var(--b);margin-top:auto}
.top-in{width:100%;padding:0.4rem 0.5rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.78rem;font-family:inherit;resize:vertical;min-height:50px}
.top-in:focus{outline:none;border-color:var(--a)} .top-in::placeholder{color:var(--d)}
.run{padding:0.45rem;font-size:0.78rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:5px;cursor:pointer;transition:all .12s}
.run:hover{filter:brightness(1.15)} .run:disabled{opacity:.4;cursor:not-allowed} .run.stop{background:var(--r);color:#fff}

/* Main area with tabs */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0}
.tab{padding:0.4rem 0.8rem;font-size:0.72rem;color:var(--d);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab:hover{color:var(--d2)} .tab.on{color:var(--a);border-bottom-color:var(--a)}

.panel{flex:1;overflow:hidden;display:none} .panel.on{display:flex;flex-direction:column}

/* Output panel */
.out{flex:1;overflow-y:auto;padding:0.8rem}
.out::-webkit-scrollbar{width:4px} .out::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.rc{margin-bottom:0.6rem;border:1px solid var(--b);border-radius:5px;overflow:hidden}
.rc-h{padding:0.35rem 0.6rem;background:var(--s);display:flex;align-items:center;gap:0.4rem;font-size:0.72rem;font-weight:600}
.rc-h .al{color:var(--a)} .rc-h .el{color:var(--d);font-weight:400;font-family:'JetBrains Mono',monospace;font-size:0.62rem}
.rc-b{padding:0.6rem;font-size:0.78rem;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;color:var(--d2)}
.rc.ev-start{border-color:var(--bl)} .rc.ev-start .rc-h{background:rgba(96,165,250,0.06)} .rc.ev-start .al{color:var(--bl)}
.rc.ev-done{border-color:var(--g)} .rc.ev-done .rc-h{background:rgba(74,222,128,0.06)} .rc.ev-done .al{color:var(--g)}
.rc.ev-error{border-color:var(--r)} .rc.ev-error .rc-h{background:rgba(248,113,113,0.06)} .rc.ev-error .al{color:var(--r)}
.sc{border-color:var(--y)} .sc .rc-h{background:rgba(251,191,36,0.08)} .sc .al{color:var(--y)}
.stats{padding:0.35rem 0.7rem;border-top:1px solid var(--b);background:var(--s);font-size:0.65rem;color:var(--d);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ph{flex:1;display:flex;align-items:center;justify-content:center;color:#27272a;font-size:0.8rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:10px;height:10px;border:2px solid var(--b2);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite}

/* Diagram panel */
.diag{flex:1;overflow:auto;padding:1rem;display:flex;align-items:center;justify-content:center}
.diag svg{max-width:100%;height:auto}

/* Agent editor panel */
.editor{flex:1;overflow-y:auto;padding:1rem}
.ed-card{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:1rem;max-width:500px;margin:0 auto}
.ed-card h3{font-size:0.85rem;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem}
.ed-card h3 span{color:var(--a)}
.ed-row{margin-bottom:0.6rem}
.ed-row label{display:block;font-size:0.68rem;color:var(--d);margin-bottom:0.2rem;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.ed-row input,.ed-row select,.ed-row textarea{width:100%;padding:0.4rem 0.5rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.78rem;font-family:inherit}
.ed-row textarea{min-height:120px;resize:vertical;font-size:0.75rem;line-height:1.5}
.ed-row input:focus,.ed-row select:focus,.ed-row textarea:focus{outline:none;border-color:var(--a)}
.ed-tools{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.3rem}
.ed-tool{padding:0.2rem 0.45rem;font-size:0.65rem;background:var(--s2);border:1px solid var(--b);border-radius:3px;cursor:pointer;color:var(--d2)}
.ed-tool.on{background:var(--ad);border-color:var(--a);color:var(--a)}
.ed-btns{display:flex;gap:0.4rem;margin-top:1rem}
.ed-save{padding:0.4rem 1rem;font-size:0.75rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:4px;cursor:pointer}
.ed-save:hover{filter:brightness(1.15)}
.ed-del{padding:0.4rem 0.8rem;font-size:0.75rem;background:transparent;border:1px solid var(--r);color:var(--r);border-radius:4px;cursor:pointer}
.ed-del:hover{background:rgba(248,113,113,0.1)}
.ed-cancel{padding:0.4rem 0.8rem;font-size:0.75rem;background:transparent;border:1px solid var(--b);color:var(--d2);border-radius:4px;cursor:pointer}

/* History panel */
.hist{display:none;width:240px;min-width:240px;border-left:1px solid var(--b);background:var(--s);overflow-y:auto}
.hist.open{display:flex;flex-direction:column}
.hi{padding:0.5rem 0.7rem;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.hi:hover{background:rgba(255,255,255,0.02)}
.hi .hm{font-size:0.6rem;font-weight:600;text-transform:uppercase;color:var(--a)}
.hi .ht{font-size:0.73rem;color:var(--d2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hi .hx{font-size:0.58rem;color:var(--d);font-family:'JetBrains Mono',monospace;margin-top:2px}

@media(max-width:768px){.lay{flex-direction:column}.sb{width:100%;min-width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--b)}.hist{display:none!important}}
</style>
</head>
<body>

<div class="hdr">
  <h1><span>Agent</span> Orchestra</h1>
  <div class="st" id="statusBar"></div>
  <div class="hdr-btn" id="histBtn" onclick="toggleHist()">History</div>
</div>

<div class="lay">
  <div class="sb">
    <!-- Config -->
    <div class="sec">
      <div class="sec-t">Config</div>
      <div class="cfg-bar">
        <select id="cfgSel"><option value="">current</option></select>
        <div class="sm" onclick="saveConfig()">Save</div>
        <div class="sm" onclick="loadConfig()">Load</div>
        <div class="sm" onclick="delConfig()">Del</div>
      </div>
    </div>
    <!-- Mode -->
    <div class="sec">
      <div class="sec-t">Mode</div>
      <div class="modes" id="modeSel"></div>
    </div>
    <!-- Agents -->
    <div class="sec">
      <div class="sec-t">Agents <span class="act" onclick="delAllAgents()" style="color:var(--r)">Clear all</span></div>
      <div class="ag-grid" id="agSel"></div>
    </div>
    <!-- Mode options -->
    <div class="opts" id="optsArea"></div>
    <!-- Auto assign status -->
    <div id="autoStatus" style="display:none;padding:0 0.8rem 0.5rem;font-size:0.7rem;color:var(--d)"></div>
    <!-- Topic + Run -->
    <div class="top-area">
      <textarea class="top-in" id="topicIn" placeholder="Enter topic or task..."></textarea>
      <div style="display:flex;gap:0.3rem">
        <button class="run" id="assignBtn" onclick="autoAssign()" style="display:none;flex:1;background:var(--s2);color:var(--a);border:1px solid var(--a)">Assign agents</button>
        <button class="run" id="runBtn" onclick="doRun()" style="flex:1">Run</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab on" data-p="output" onclick="switchTab(this)">Output</div>
      <div class="tab" data-p="diagram" onclick="switchTab(this)">Diagram</div>
      <div class="tab" data-p="editor" onclick="switchTab(this)">Agent Editor</div>
    </div>
    <div class="panel on" id="p-output">
      <div class="out" id="output"><div class="ph">Select mode, agents, and topic</div></div>
      <div class="stats" id="statsBar" style="display:none"></div>
    </div>
    <div class="panel" id="p-diagram">
      <div class="diag" id="diagArea"></div>
    </div>
    <div class="panel" id="p-editor">
      <div class="editor" id="editorArea"><div class="ph">Click an agent chip or + New to edit</div></div>
    </div>
  </div>

  <div class="hist" id="histPanel">
    <div class="sec" style="flex-shrink:0"><div class="sec-t">History</div></div>
    <div id="histList" style="flex:1;overflow-y:auto"></div>
  </div>
</div>

<script>
const BASE = '/agents';
const MODES = {auto:'Auto',discuss:'Discussion',pipeline:'Pipeline',parallel:'Parallel',consensus:'Consensus'};
const ALL_TOOLS = ['Read','Write','Edit','Bash','Glob','Grep','WebSearch','WebFetch'];
const PIPELINE_ACTIONS = ['design','implement','review','test'];
const MODEL_COLORS = {opus:'#c084fc',sonnet:'#60a5fa',haiku:'#4ade80'};

// No hardcoded templates — AI generates configs from any role name

let agents={}, selectedMode='discuss', selectedAgents=new Set(), ws=null, running=false, editingAgent=null;
let pipeSteps=[{agent:'architect',action:'design'},{agent:'developer',action:'implement'},{agent:'reviewer',action:'review'}];
let parTasks=[{agent:'developer',description:''}];
let agentActivity={};

// ── Init ──
async function init(){
  try{
    const d=await(await fetch(BASE+'/api/config')).json();
    agents=d.agents;
    selectedAgents=new Set(Object.keys(agents).slice(0,3));
    render();
    loadConfigs();
    drawDiagram();
    setInterval(pollActivity,3000);
  }catch(e){document.getElementById('statusBar').textContent='Failed to load'}
}

function render(){renderModes();renderAgents();renderOpts()}

// ── Modes ──
function renderModes(){
  document.getElementById('modeSel').innerHTML=Object.entries(MODES).map(([k,v])=>
    `<div class="mbtn ${k===selectedMode?'on':''}" onclick="selMode('${k}')">${v}</div>`).join('');
}
function selMode(m){selectedMode=m;render();
  document.getElementById('assignBtn').style.display=m==='auto'?'block':'none';
  document.getElementById('autoStatus').style.display='none';
}

// ── Agents ──
function renderAgents(){
  const el=document.getElementById('agSel');
  el.innerHTML=Object.entries(agents).map(([k,v])=>{
    const st=agentActivity[v.display_name]||'off';
    return `<div class="ag-c ${selectedAgents.has(k)?'sel':''}" onclick="toggleAg(event,'${k}')">
      <span class="dot ${st}"></span>${v.display_name} <span class="mt">${v.model}</span>
      <span class="edit-ic" onclick="event.stopPropagation();editAgent('${k}')">&#9998;</span>
      <span class="edit-ic" onclick="event.stopPropagation();quickDelAgent('${k}')" style="color:var(--r)">&times;</span>
    </div>`;
  }).join('')+`<div class="ag-new" onclick="newAgent()">+</div>`;
}
function toggleAg(e,n){if(e.target.classList.contains('edit-ic'))return;selectedAgents.has(n)?selectedAgents.delete(n):selectedAgents.add(n);renderAgents()}
async function quickDelAgent(name){
  await fetch(BASE+'/api/agents/'+name,{method:'DELETE'});
  const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;
  selectedAgents.delete(name);render();drawDiagram();
}
async function delAllAgents(){
  await Promise.all(Object.keys(agents).map(k=>fetch(BASE+'/api/agents/'+k,{method:'DELETE'})));
  agents={};selectedAgents.clear();render();drawDiagram();
}

// ── Options ──
function renderOpts(){
  const a=document.getElementById('optsArea');
  if(selectedMode==='pipeline'){
    a.style.display='block';
    a.innerHTML='<div class="sec-t">Steps</div>'+pipeSteps.map((s,i)=>
      `<div class="orow"><select onchange="pipeSteps[${i}].agent=this.value">${agOpts(s.agent)}</select><select onchange="pipeSteps[${i}].action=this.value">${PIPELINE_ACTIONS.map(x=>`<option ${x===s.action?'selected':''}>${x}</option>`).join('')}</select><span class="xbtn" onclick="pipeSteps.splice(${i},1);renderOpts()">x</span></div>`
    ).join('')+`<span class="abtn" onclick="pipeSteps.push({agent:'developer',action:'implement'});renderOpts()">+ step</span>`;
  }else if(selectedMode==='parallel'){
    a.style.display='block';
    a.innerHTML='<div class="sec-t">Subtasks</div>'+parTasks.map((t,i)=>
      `<div class="orow"><select onchange="parTasks[${i}].agent=this.value">${agOpts(t.agent)}</select><input value="${esc(t.description)}" placeholder="subtask..." onchange="parTasks[${i}].description=this.value"><span class="xbtn" onclick="parTasks.splice(${i},1);renderOpts()">x</span></div>`
    ).join('')+`<span class="abtn" onclick="parTasks.push({agent:'developer',description:''});renderOpts()">+ task</span>`;
  }else{a.style.display='none';a.innerHTML=''}
}
function agOpts(s){return Object.entries(agents).map(([k,v])=>`<option value="${k}" ${k===s?'selected':''}>${v.display_name}</option>`).join('')}

// ── Config Save/Load ──
async function loadConfigs(){
  const cfgs=await(await fetch(BASE+'/api/configs')).json();
  const sel=document.getElementById('cfgSel');
  sel.innerHTML='<option value="">current</option>'+cfgs.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
}
async function saveConfig(){
  const name=prompt('Config name:');if(!name)return;
  await fetch(BASE+'/api/configs/'+encodeURIComponent(name),{method:'POST'});
  loadConfigs();
}
async function loadConfig(){
  const name=document.getElementById('cfgSel').value;if(!name)return;
  await fetch(BASE+'/api/configs/'+encodeURIComponent(name)+'/load',{method:'POST'});
  const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;selectedAgents=new Set(Object.keys(agents).slice(0,3));render();drawDiagram();
}
async function delConfig(){
  const name=document.getElementById('cfgSel').value;if(!name)return;
  if(!confirm('Delete config "'+name+'"?'))return;
  await fetch(BASE+'/api/configs/'+encodeURIComponent(name),{method:'DELETE'});
  loadConfigs();
}

// ── Agent Editor ──
function editAgent(name){
  editAgentWithData(name, agents[name]||{}, false);
}
function editAgentWithData(name, a, isNew){
  editingAgent=name;
  switchTab(document.querySelector('[data-p="editor"]'));
  const tools=a.allowed_tools||[];
  const idReadonly=name&&!isNew;
  document.getElementById('editorArea').innerHTML=`
    <div class="ed-card">
      <h3><span>&#9998;</span> ${idReadonly?'Edit':'New'} Agent</h3>
      <div class="ed-row"><label>ID (lowercase)</label><input id="ed-id" value="${esc(name)}" ${idReadonly?'readonly style="opacity:0.5"':'placeholder="e.g. my_agent"'}></div>
      <div class="ed-row"><label>Display Name</label><input id="ed-dn" value="${esc(a.display_name||'')}"></div>
      <div class="ed-row"><label>Model</label><select id="ed-mod"><option ${a.model==='opus'?'selected':''}>opus</option><option ${a.model==='sonnet'?'selected':''}>sonnet</option><option ${a.model==='haiku'?'selected':''}>haiku</option></select></div>
      <div class="ed-row"><label>Max Turns</label><input id="ed-mt" type="number" value="${a.max_turns||50}"></div>
      <div class="ed-row"><label>Tools</label><div class="ed-tools">${ALL_TOOLS.map(t=>`<div class="ed-tool ${tools.includes(t)?'on':''}" onclick="this.classList.toggle('on')" data-t="${t}">${t}</div>`).join('')}</div></div>
      <div class="ed-row"><label>System Prompt</label><textarea id="ed-sp">${esc(a.system_prompt||'')}</textarea></div>
      <div class="ed-btns">
        <button class="ed-save" onclick="saveAgent()">Save</button>
        ${idReadonly?`<button class="ed-del" onclick="delAgent('${name}')">Delete</button>`:''}
        <button class="ed-cancel" onclick="editingAgent=null;document.getElementById('editorArea').innerHTML='<div class=ph>Click an agent chip or + New to edit</div>'">Cancel</button>
      </div>
    </div>`;
}
function newAgent(){
  switchTab(document.querySelector('[data-p="editor"]'));
  document.getElementById('editorArea').innerHTML=`
    <div class="ed-card">
      <h3><span>+</span> New Agent</h3>
      <p style="font-size:0.78rem;color:var(--d2);margin-bottom:0.8rem">Enter any role name and click Auto-fill. AI will generate the config.</p>
      <div style="display:flex;gap:0.4rem;align-items:center">
        <input id="newRoleName" style="flex:1;padding:0.45rem 0.6rem;background:var(--bg);border:1px solid var(--b);border-radius:5px;color:var(--t);font-size:0.85rem;font-family:inherit" placeholder="e.g. Marketing Analyst, Database Expert, API Designer...">
        <button id="autoFillBtn" onclick="autoFillAgent()" style="padding:0.45rem 0.9rem;font-size:0.78rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:5px;cursor:pointer;white-space:nowrap;transition:all .12s">Auto-fill</button>
      </div>
      <div id="autoFillStatus" style="margin-top:0.5rem;font-size:0.72rem;color:var(--d)"></div>
    </div>`;
  setTimeout(()=>document.getElementById('newRoleName')?.focus(),100);
}

async function autoFillAgent(){
  const name=document.getElementById('newRoleName').value.trim();
  if(!name)return;
  const btn=document.getElementById('autoFillBtn');
  const status=document.getElementById('autoFillStatus');
  btn.disabled=true;btn.textContent='Generating...';btn.style.opacity='0.5';
  status.innerHTML='<div style="display:flex;align-items:center;gap:0.4rem"><div class="spinner"></div> AI is generating config for "'+esc(name)+'"...</div>';
  try{
    const r=await fetch(BASE+'/api/agents/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role_name:name})});
    const data=await r.json();
    if(data.error){status.textContent='Error: '+data.error;btn.disabled=false;btn.textContent='Auto-fill';btn.style.opacity='1';return}
    editAgentWithData(data.id||'',{
      display_name:data.display_name||name,
      model:data.model||'sonnet',
      system_prompt:data.system_prompt||'',
      allowed_tools:data.allowed_tools||['Read','Glob','Grep'],
      max_turns:data.max_turns||50,
    },true);
  }catch(e){
    status.textContent='Error: '+e.message;
    btn.disabled=false;btn.textContent='Auto-fill';btn.style.opacity='1';
  }
}

async function saveAgent(){
  const id=(document.getElementById('ed-id').value||'').trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!id){alert('ID required');return}
  const tools=[...document.querySelectorAll('.ed-tool.on')].map(e=>e.dataset.t);
  const body={
    display_name:document.getElementById('ed-dn').value.trim()||id,
    model:document.getElementById('ed-mod').value,
    system_prompt:document.getElementById('ed-sp').value,
    allowed_tools:tools,
    max_turns:parseInt(document.getElementById('ed-mt').value)||50,
  };
  await fetch(BASE+'/api/agents/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;
  if(!selectedAgents.has(id))selectedAgents.add(id);
  render();drawDiagram();
  editAgent(id);
}

async function delAgent(name){
  await fetch(BASE+'/api/agents/'+name,{method:'DELETE'});
  const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;
  selectedAgents.delete(name);render();drawDiagram();
  document.getElementById('editorArea').innerHTML='<div class="ph">Agent deleted</div>';
}

// ── Diagram ──
function drawDiagram(){
  const area=document.getElementById('diagArea');
  const names=Object.entries(agents);
  const n=names.length;
  if(!n){area.innerHTML='<div class="ph">No agents</div>';return}

  const W=600,H=400,cx=W/2,cy=H/2,R=140;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif">`;
  // Background
  svg+=`<rect width="${W}" height="${H}" fill="#09090b" rx="8"/>`;
  // Center: coordinator
  svg+=`<circle cx="${cx}" cy="${cy}" r="28" fill="#18181b" stroke="#818cf8" stroke-width="1.5"/>`;
  svg+=`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#818cf8" font-size="9" font-weight="600">Coordinator</text>`;

  // Mode label
  svg+=`<text x="${cx}" y="24" text-anchor="middle" fill="#71717a" font-size="10">${MODES[selectedMode]||selectedMode} mode</text>`;

  names.forEach(([k,v],i)=>{
    const angle=(2*Math.PI*i/n)-Math.PI/2;
    const x=cx+R*Math.cos(angle), y=cy+R*Math.sin(angle);
    const isSel=selectedAgents.has(k);
    const st=agentActivity[v.display_name]||'off';
    const mc=MODEL_COLORS[v.model]||'#a1a1aa';

    // Line to center
    if(isSel) svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${st==='working'?'#fbbf24':'#27272a'}" stroke-width="${st==='working'?1.5:0.8}" ${st==='working'?'stroke-dasharray="4 3"':''}/>`;

    // Node
    const fill=isSel?'#18181b':'#111113';
    const stroke=st==='working'?'#fbbf24':isSel?mc:'#27272a';
    const sw=st==='working'?2:1;
    svg+=`<circle cx="${x}" cy="${y}" r="24" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;

    // Activity glow
    if(st==='working') svg+=`<circle cx="${x}" cy="${y}" r="24" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"><animate attributeName="r" from="24" to="32" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.3" to="0" dur="1.5s" repeatCount="indefinite"/></circle>`;

    // Name + model
    svg+=`<text x="${x}" y="${y-3}" text-anchor="middle" fill="${isSel?'#e4e4e7':'#52525b'}" font-size="8.5" font-weight="500">${v.display_name}</text>`;
    svg+=`<text x="${x}" y="${y+8}" text-anchor="middle" fill="${mc}" font-size="6.5" font-family="JetBrains Mono,monospace">${v.model}</text>`;

    // Status dot
    const dc=st==='working'?'#fbbf24':st==='idle'?'#4ade80':'#3f3f46';
    svg+=`<circle cx="${x+16}" cy="${y-16}" r="3.5" fill="${dc}"/>`;
  });

  // Mode-specific arrows for selected agents
  const selArr=[...selectedAgents].filter(k=>agents[k]);
  if(selectedMode==='pipeline'&&selArr.length>1){
    for(let i=0;i<selArr.length-1;i++){
      const idx1=names.findIndex(([k])=>k===selArr[i]);
      const idx2=names.findIndex(([k])=>k===selArr[i+1]);
      if(idx1<0||idx2<0)continue;
      const a1=(2*Math.PI*idx1/n)-Math.PI/2, a2=(2*Math.PI*idx2/n)-Math.PI/2;
      const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const mx=(x1+x2)/2+15*Math.cos((a1+a2)/2+0.3), my=(y1+y2)/2+15*Math.sin((a1+a2)/2+0.3);
      svg+=`<path d="M${x1+20*Math.cos(a2-a1>0?0.3:-0.3)} ${y1+20*Math.sin(a2-a1>0?0.3:-0.3)} Q${mx} ${my} ${x2-20*Math.cos(a2-a1>0?0.3:-0.3)} ${y2-20*Math.sin(a2-a1>0?0.3:-0.3)}" fill="none" stroke="#4ade8044" stroke-width="1.5" marker-end="url(#arrow)"/>`;
    }
    svg+=`<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#4ade80"/></marker></defs>`;
  }

  svg+=`</svg>`;
  area.innerHTML=svg;
}

async function pollActivity(){
  try{
    const d=await(await fetch(BASE+'/api/activity')).json();
    const changed=JSON.stringify(d)!==JSON.stringify(agentActivity);
    agentActivity=d;
    if(changed){renderAgents();drawDiagram()}
  }catch(e){}
}

// ── Tabs ──
function switchTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('p-'+el.dataset.p).classList.add('on');
  if(el.dataset.p==='diagram')drawDiagram();
}

// ── Run ──
let autoPlan=null; // cached plan from autoAssign

async function autoAssign(){
  const topic=document.getElementById('topicIn').value.trim();
  if(!topic){document.getElementById('autoStatus').style.display='block';document.getElementById('autoStatus').textContent='Enter a topic first';return}
  const btn=document.getElementById('assignBtn');
  btn.disabled=true;btn.textContent='Planning...';
  document.getElementById('autoStatus').style.display='block';
  document.getElementById('autoStatus').innerHTML='<div style="display:flex;align-items:center;gap:0.4rem"><div class="spinner"></div> AI is choosing agents and mode...</div>';
  try{
    const r=await fetch(BASE+'/api/auto-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic})});
    const plan=await r.json();
    if(plan.error){document.getElementById('autoStatus').textContent='Error: '+plan.error;btn.disabled=false;btn.textContent='Assign agents';return}
    // Create missing agents
    for(const ag of plan.agents||[]){
      if(!agents[ag.id]){
        await fetch(BASE+'/api/agents/'+ag.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ag)});
      }
    }
    const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;
    const agIds=(plan.agents||[]).map(a=>a.id);
    selectedAgents=new Set(agIds);
    selectedMode=plan.mode||'discuss';
    autoPlan=plan;
    render();drawDiagram();
    // Show assigned info
    const agNames=(plan.agents||[]).map(a=>a.display_name).join(', ');
    document.getElementById('autoStatus').style.display='block';
    document.getElementById('autoStatus').innerHTML=`<span style="color:var(--g)">&#10003;</span> <b style="color:var(--t)">${MODES[plan.mode]||plan.mode}</b> &mdash; ${agNames}<br><span style="color:var(--d2)">${plan.reasoning||''}</span>`;
    // Keep assign button visible but update text
    document.getElementById('assignBtn').style.display='block';
  }catch(e){document.getElementById('autoStatus').textContent='Error: '+e.message}
  btn.disabled=false;btn.textContent='Assign agents';
}

async function doRun(){
  if(running){if(ws)ws.close();return}
  const topic=document.getElementById('topicIn').value.trim();if(!topic)return;
  const out=document.getElementById('output');out.innerHTML='';
  document.getElementById('statsBar').style.display='none';
  switchTab(document.querySelector('[data-p="output"]'));
  const btn=document.getElementById('runBtn');btn.textContent='Stop';btn.classList.add('stop');running=true;

  // Auto mode: use cached plan from autoAssign, or plan now
  let mode=selectedMode, agList=[...selectedAgents], opts={};
  if(selectedMode==='auto'||autoPlan){
    if(autoPlan){
      // Use cached plan from "Assign agents" button
      mode=autoPlan.mode||'discuss';
      agList=(autoPlan.agents||[]).map(a=>a.id);
      opts=autoPlan.options||{};
      const agNames=(autoPlan.agents||[]).map(a=>a.display_name).join(', ');
      addCard('Auto','done',`Mode: **${MODES[mode]||mode}**\nAgents: ${agNames}\n${autoPlan.reasoning||''}`);
      autoPlan=null;
    }else{
      // No pre-plan, do it now
      document.getElementById('statusBar').textContent='planning...';
      addCard('Auto','start','AI is analyzing the task and choosing agents + mode...');
      try{
        const r=await fetch(BASE+'/api/auto-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic})});
        const plan=await r.json();
        if(plan.error){addCard('Auto','error',plan.error);fin();return}
        for(const ag of plan.agents||[]){
          if(!agents[ag.id]) await fetch(BASE+'/api/agents/'+ag.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ag)});
        }
        const d=await(await fetch(BASE+'/api/config')).json();agents=d.agents;
        agList=(plan.agents||[]).map(a=>a.id);
        selectedAgents=new Set(agList);
        mode=plan.mode||'discuss';
        opts=plan.options||{};
        render();drawDiagram();
        const agNames=(plan.agents||[]).map(a=>a.display_name).join(', ');
        addCard('Auto','done',`Mode: **${MODES[mode]||mode}**\nAgents: ${agNames}\n${plan.reasoning||''}`);
      }catch(e){addCard('Auto','error','Planning failed: '+e.message);fin();return}
    }
  }
  if(mode==='auto'){fin();return}

  if(mode==='pipeline')opts.steps=opts.steps||pipeSteps;
  if(mode==='parallel')opts.tasks=opts.tasks||parTasks;

  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}${BASE}/ws/run`);
  ws.onopen=()=>{
    ws.send(JSON.stringify({mode,topic,agents:agList,options:opts}));
    document.getElementById('statusBar').textContent='running...';
  };
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='update'){
      addCard(d.agent,d.event,d.text);
      if(d.event==='start')agentActivity[d.agent]='working';
      else if(d.event==='done'||d.event==='error')agentActivity[d.agent]='idle';
      renderAgents();drawDiagram();
    }else if(d.type==='result'){
      if(d.summary)addSum(d.summary);showStats(d);fin();
    }else if(d.type==='error'){addCard('Error','error',d.text);fin()}
  };
  ws.onclose=()=>{if(running)fin()};
  ws.onerror=()=>{addCard('Error','error','WebSocket failed');fin()};
}
function fin(){running=false;agentActivity={};renderAgents();drawDiagram();document.getElementById('runBtn').textContent='Run';document.getElementById('runBtn').classList.remove('stop');document.getElementById('statusBar').textContent=''}

function addCard(ag,ev,txt){
  const out=document.getElementById('output');
  if(ev==='start'){const c=document.createElement('div');c.className='rc ev-start';c.id='a-'+ag.replace(/\s/g,'');c.innerHTML=`<div class="rc-h"><span class="al">${esc(ag)}</span><span class="el">${esc(txt)}</span><div class="spinner"></div></div>`;out.appendChild(c);out.scrollTop=out.scrollHeight;return}
  const a=document.getElementById('a-'+ag.replace(/\s/g,''));if(a)a.remove();
  const c=document.createElement('div');c.className=`rc ev-${ev}`;c.innerHTML=`<div class="rc-h"><span class="al">${esc(ag)}</span><span class="el">${ev}</span></div><div class="rc-b">${fmtMd(txt)}</div>`;out.appendChild(c);out.scrollTop=out.scrollHeight;
}
function addSum(txt){const out=document.getElementById('output');const c=document.createElement('div');c.className='rc sc';c.innerHTML=`<div class="rc-h"><span class="al">Summary</span></div><div class="rc-b">${fmtMd(txt)}</div>`;out.appendChild(c);out.scrollTop=out.scrollHeight}
function showStats(d){const b=document.getElementById('statsBar');b.style.display='block';b.textContent=`${d.responses} responses | $${(d.cost||0).toFixed(4)} | ${((d.duration_ms||0)/1000).toFixed(1)}s`}

// ── History ──
let histOpen=false;
function toggleHist(){histOpen=!histOpen;document.getElementById('histPanel').classList.toggle('open',histOpen);document.getElementById('histBtn').classList.toggle('on',histOpen);if(histOpen)loadHist()}
async function loadHist(){
  const runs=await(await fetch(BASE+'/api/history')).json();
  document.getElementById('histList').innerHTML=runs.length?runs.map(r=>`<div class="hi" onclick="loadRun('${r.id}')"><div class="hm">${r.mode}</div><div class="ht">${esc(r.topic||'')}</div><div class="hx">${r.agents?.length||0}ag $${(r.cost||0).toFixed(3)} ${((r.duration_ms||0)/1000).toFixed(0)}s</div></div>`).join(''):'<div style="padding:1rem;color:var(--d);font-size:0.8rem">No runs</div>';
}
async function loadRun(id){
  const r=await(await fetch(BASE+'/api/history/'+id)).json();if(r.error)return;
  switchTab(document.querySelector('[data-p="output"]'));
  const out=document.getElementById('output');out.innerHTML='';
  if(r.transcript){const c=document.createElement('div');c.className='rc ev-done';c.innerHTML=`<div class="rc-h"><span class="al">${r.mode} run</span><span class="el">${id}</span></div><div class="rc-b">${fmtMd(r.transcript)}</div>`;out.appendChild(c)}
  if(r.summary)addSum(r.summary);
  document.getElementById('statsBar').style.display='block';
  document.getElementById('statsBar').textContent=`${r.responses||0} responses | $${(r.cost||0).toFixed(4)} | ${((r.duration_ms||0)/1000).toFixed(1)}s`;
}

// ── Helpers ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtMd(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px;font-size:.78em">$1</code>').replace(/^### (.+)$/gm,'<strong style="color:var(--t);font-size:.85rem">$1</strong>').replace(/^## (.+)$/gm,'<strong style="color:var(--t);font-size:.9rem">$1</strong>').replace(/^- (.+)$/gm,'&nbsp;&nbsp;&#8226; $1').replace(/\n/g,'<br>')}

init();
</script>
