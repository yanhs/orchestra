<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Orchestra</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--s:#111113;--s2:#18181b;--s3:#1e1e22;--b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);--t:#e4e4e7;--d:#71717a;--d2:#a1a1aa;--a:#818cf8;--ad:rgba(129,140,248,0.12);--g:#4ade80;--y:#fbbf24;--r:#f87171;--bl:#60a5fa;--p:#c084fc;--o:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* Header */
.hdr{padding:0.5rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:0.8rem;background:var(--s);flex-shrink:0}
.hdr h1{font-size:0.9rem;font-weight:600} .hdr h1 span{color:var(--a)}
.hdr-sp{flex:1}
.hb{padding:0.2rem 0.55rem;font-size:0.68rem;background:var(--s2);border:1px solid var(--b);border-radius:4px;cursor:pointer;color:var(--d2);transition:all .12s}
.hb:hover{border-color:var(--a);color:var(--a)} .hb.on{background:var(--ad);border-color:var(--a);color:var(--a)}
.hb-r{color:#fff;background:rgba(248,113,113,0.15);border-color:var(--r);font-weight:600}

/* ── STATE: TOPIC — now always shows work layout ── */
.topic-view{display:none}
body.st-topic .topic-view{display:none}
.tv-box{width:100%;max-width:560px;padding:2rem}
.tv-box h2{font-size:1.4rem;font-weight:600;margin-bottom:0.3rem;color:var(--t)}
.tv-box h2 span{color:var(--a)}
.tv-box p{font-size:0.82rem;color:var(--d2);margin-bottom:1.2rem}
.tv-ta{width:100%;padding:0.7rem 0.8rem;background:var(--bg);border:1px solid var(--b2);border-radius:6px;color:var(--t);font-size:0.9rem;font-family:inherit;resize:vertical;min-height:80px;line-height:1.5}
.tv-ta:focus{outline:none;border-color:var(--a)}
.tv-ta::placeholder{color:#52525b}
.tv-btns{display:flex;gap:0.5rem;margin-top:0.7rem}
.btn-plan{flex:1;padding:0.55rem;font-size:0.85rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:6px;cursor:pointer;transition:all .15s}
.btn-plan:hover{filter:brightness(1.15)} .btn-plan:disabled{opacity:.35;cursor:not-allowed}
.tv-manual{margin-top:0.8rem;text-align:center;font-size:0.72rem}
.tv-manual a{color:var(--d);cursor:pointer;text-decoration:none} .tv-manual a:hover{color:var(--a)}

/* ── STATE: WORK — always visible ── */
.work-view{flex:1;display:flex;overflow:hidden}

/* Plan Card (left) */
.pc{width:380px;min-width:380px;border-right:1px solid var(--b);background:var(--s);display:flex;flex-direction:column;overflow:hidden}
.pc-scroll{flex:1;overflow-y:auto;padding:0.8rem}
.pc-scroll::-webkit-scrollbar{width:4px} .pc-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
body.st-running .pc-scroll{opacity:0.5;pointer-events:none}

/* ── STATE: CHOOSE (pick a plan variant) ── */
.choose-view{flex:1;display:none;align-items:center;justify-content:center;background:var(--s);overflow-y:auto;padding:2rem}
body.st-choose .choose-view{display:flex}
body.st-choose .topic-view,body.st-choose .work-view{display:none}
.cv-box{width:100%;max-width:800px}
.cv-box h2{font-size:1.1rem;font-weight:600;margin-bottom:0.2rem} .cv-box h2 span{color:var(--a)}
.cv-topic{font-size:0.78rem;color:var(--d2);margin-bottom:1rem;word-wrap:break-word}
.cv-grid{display:flex;flex-direction:column;gap:0.5rem}
.cv-card{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:0.7rem 1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:0.8rem}
.cv-card:hover{border-color:var(--a)}
.cv-card.recommended{border-color:var(--a);background:var(--ad)}
.cv-card.recommended .cv-rec{display:inline-block}
.cv-rec{display:none;font-size:0.55rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;background:var(--a);color:#000;padding:0.1rem 0.35rem;border-radius:3px;margin-left:0.4rem}
.cv-num{font-size:0.85rem;font-weight:700;width:22px;text-align:center;flex-shrink:0}
.cv-body{flex:1;min-width:0}
.cv-label{font-size:0.82rem;font-weight:600;display:flex;align-items:center}
.cv-desc{font-size:0.7rem;color:var(--d2);line-height:1.4;margin-top:0.15rem}
.cv-right{display:flex;align-items:center;gap:0.6rem;flex-shrink:0}
.cv-meta{font-size:0.6rem;color:var(--d);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.cv-agents{display:flex;flex-wrap:wrap;gap:0.15rem}
.cv-ag{padding:0.1rem 0.35rem;font-size:0.55rem;background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--d2);white-space:nowrap}
.cv-desc{font-size:0.72rem;color:var(--d2);line-height:1.5;margin-bottom:0.6rem;flex:1}
.cv-meta{font-size:0.62rem;color:var(--d);font-family:'JetBrains Mono',monospace}
.cv-agents{display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.4rem}
.cv-ag{padding:0.15rem 0.4rem;font-size:0.6rem;background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--d2)}
.cv-back{margin-top:1rem;text-align:center;font-size:0.72rem}
.cv-back a{color:var(--d);cursor:pointer} .cv-back a:hover{color:var(--a)}

/* Plan sections */
.ps{margin-bottom:0.7rem}
.ps-label{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--d);margin-bottom:0.3rem}

/* Topic in plan */
.pc-topic{font-size:0.82rem;color:var(--t);padding:0.4rem 0.5rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;cursor:pointer;word-wrap:break-word}
.pc-topic:hover{border-color:var(--b2)}
.pc-topic-edit{width:100%;padding:0.4rem 0.5rem;background:var(--bg);border:1px solid var(--a);border-radius:4px;color:var(--t);font-size:0.82rem;font-family:inherit;resize:vertical;min-height:40px}

/* Reasoning */
.pc-reason{font-size:0.72rem;color:var(--d);line-height:1.5;padding:0.4rem 0.5rem;background:var(--bg);border-radius:4px;border:1px solid var(--b)}

/* Mode badge */
.mode-badge{display:inline-block;position:relative}
.mode-sel{padding:0.3rem 0.7rem;font-size:0.75rem;font-weight:600;background:var(--ad);border:1px solid var(--a);border-radius:5px;color:var(--a);cursor:pointer;appearance:none;font-family:inherit}
.mode-sel:focus{outline:none}
.mode-sel option{background:var(--s2);color:var(--t)}

/* Agent cards */
.ag-card{background:var(--bg);border:1px solid var(--b);border-radius:5px;margin-bottom:0.35rem;overflow:hidden}
.ag-head{padding:0.35rem 0.5rem;display:flex;align-items:center;gap:0.35rem;cursor:pointer;font-size:0.75rem}
.ag-head:hover{background:rgba(255,255,255,0.015)}
.ag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ag-name{font-weight:500;flex:1}
.ag-mtag{font-size:0.6rem;color:var(--d);font-family:'JetBrains Mono',monospace;padding:1px 5px;background:var(--s2);border-radius:3px}
.ag-x{font-size:0.7rem;color:var(--d);cursor:pointer;padding:0 3px} .ag-x:hover{color:var(--r)}
.ag-chev{font-size:0.55rem;color:var(--d);transition:transform .15s}
.ag-card.open .ag-chev{transform:rotate(180deg)}
.ag-body{display:none;padding:0.5rem;border-top:1px solid var(--b)}
.ag-card.open .ag-body{display:block}
.ag-row{margin-bottom:0.4rem}
.ag-row label{display:block;font-size:0.6rem;color:var(--d);margin-bottom:0.15rem;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.ag-row textarea{width:100%;padding:0.35rem 0.4rem;background:var(--s);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.72rem;font-family:inherit;resize:vertical;min-height:60px;line-height:1.4}
.ag-row select,.ag-row input[type=number]{padding:0.25rem 0.4rem;background:var(--s);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.72rem;font-family:inherit}
.ag-row textarea:focus,.ag-row select:focus,.ag-row input:focus{outline:none;border-color:var(--a)}
.ag-tools{display:flex;flex-wrap:wrap;gap:0.2rem}
.ag-tool{padding:0.15rem 0.4rem;font-size:0.6rem;background:var(--s);border:1px solid var(--b);border-radius:3px;cursor:pointer;color:var(--d2)}
.ag-tool.on{background:var(--ad);border-color:var(--a);color:var(--a)}

/* Add agent */
.add-ag{display:flex;gap:0.3rem;align-items:center;margin-top:0.35rem}
.add-ag input{flex:1;padding:0.3rem 0.5rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.72rem;font-family:inherit}
.add-ag input:focus{outline:none;border-color:var(--a)}
.add-ag input::placeholder{color:#52525b}
.add-ag button{padding:0.3rem 0.6rem;font-size:0.68rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:4px;cursor:pointer;white-space:nowrap}
.add-ag button:disabled{opacity:.4}

/* Mode options */
.opt-step{display:flex;gap:0.25rem;margin-bottom:0.25rem;align-items:center}
.opt-step select,.opt-step input{padding:0.25rem 0.4rem;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-size:0.7rem;font-family:inherit}
.opt-step select{min-width:80px} .opt-step input{flex:1}
.opt-step select:focus,.opt-step input:focus{outline:none;border-color:var(--a)}
.opt-x{padding:0.1rem 0.3rem;font-size:0.6rem;color:var(--d);cursor:pointer;border:1px solid var(--b);border-radius:3px;background:var(--s2)}
.opt-x:hover{color:var(--r);border-color:var(--r)}
.opt-add{padding:0.15rem 0.45rem;font-size:0.62rem;color:var(--d2);cursor:pointer;border:1px solid var(--b);border-radius:3px;background:var(--s2)}
.opt-add:hover{border-color:var(--a);color:var(--a)}

/* Run button area */
.pc-run{padding:0.7rem 0.8rem;border-top:1px solid var(--b)}
.btn-run{width:100%;padding:0.5rem;font-size:0.82rem;font-weight:600;background:var(--a);color:#000;border:none;border-radius:6px;cursor:pointer;transition:all .12s}
.btn-run:hover{filter:brightness(1.15)} .btn-run:disabled{opacity:.35;cursor:not-allowed}
.btn-run.stop{background:var(--r);color:#fff}

/* Right: output area */
.out-area{flex:1;display:flex;flex-direction:column;background:var(--s);overflow:hidden}
.out-tabs{display:flex;border-bottom:1px solid var(--b);background:var(--s2);flex-shrink:0}
.otab{padding:0.35rem 0.7rem;font-size:0.7rem;color:var(--d);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s}
.otab:hover{color:var(--d2)} .otab.on{color:var(--a);border-bottom-color:var(--a)}
.opanel{flex:1;overflow:hidden;display:none} .opanel.on{display:flex;flex-direction:column}
.out{flex:1;overflow-y:auto;padding:0.8rem;background:var(--s)}
.out::-webkit-scrollbar{width:4px} .out::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.diag{flex:1;overflow:auto;padding:1rem;display:flex;align-items:center;justify-content:center;background:var(--s)}
.stats{padding:0.3rem 0.7rem;border-top:1px solid var(--b);background:var(--s2);font-size:0.64rem;color:var(--d);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ph{flex:1;display:flex;align-items:center;justify-content:center;color:#27272a;font-size:0.8rem}

/* Cards in output */
.rc{margin-bottom:0.5rem;border:1px solid var(--b);border-radius:5px;overflow:hidden}
.rc-h{padding:0.3rem 0.5rem;background:var(--s2);display:flex;align-items:center;gap:0.4rem;font-size:0.7rem;font-weight:600}
.rc-h .al{color:var(--a)} .rc-h .el{color:var(--d);font-weight:400;font-family:'JetBrains Mono',monospace;font-size:0.6rem}
.rc-b{padding:0.5rem;font-size:0.75rem;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;color:var(--d2)}
.rc.ev-start{border-color:var(--bl)} .rc.ev-start .rc-h{background:rgba(96,165,250,0.06)} .rc.ev-start .al{color:var(--bl)}
.rc.ev-done{border-color:var(--g)} .rc.ev-done .rc-h{background:rgba(74,222,128,0.06)} .rc.ev-done .al{color:var(--g)}
.rc.ev-error{border-color:var(--r)} .rc.ev-error .rc-h{background:rgba(248,113,113,0.06)} .rc.ev-error .al{color:var(--r)}
.sc{border-color:var(--y)} .sc .rc-h{background:rgba(251,191,36,0.08)} .sc .al{color:var(--y)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:10px;height:10px;border:2px solid var(--b2);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* History panel */
.hist{display:none;width:240px;min-width:240px;border-left:1px solid var(--b);background:var(--s);overflow-y:auto;flex-shrink:0}
.hist.open{display:flex;flex-direction:column}
.hi{padding:0.45rem 0.6rem;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.hi:hover{background:rgba(255,255,255,0.02)}
.hi .hm{font-size:0.58rem;font-weight:600;text-transform:uppercase;color:var(--a)}
.hi .ht{font-size:0.7rem;color:var(--d2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hi .hx{font-size:0.55rem;color:var(--d);font-family:'JetBrains Mono',monospace;margin-top:2px}

@media(max-width:768px){.pc{width:100%;min-width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--b)}.work-view{flex-direction:column}.hist{display:none!important}}
</style>
</head>
<body class="st-topic">

<div class="hdr">
  <h1><span>Agent</span> Orchestra</h1>
  <div class="hdr-sp"></div>
  <div class="hb hb-r" onclick="fullReset()">Reset</div>
  <div class="hb" id="histBtn" onclick="toggleHist()">History</div>
</div>

<!-- topic-view removed — input is now in plan card -->

<!-- STATE: CHOOSE VARIANT -->
<div class="choose-view">
  <div class="cv-box">
    <h2><span>Choose</span> a plan</h2>
    <div class="cv-topic" id="cvTopic"></div>
    <div class="cv-grid" id="cvGrid"></div>
    <div class="cv-back"><a onclick="fullReset()">Back to start</a></div>
  </div>
</div>

<!-- STATE: WORK (plan-ready / running / done) -->
<div class="work-view">
  <div class="pc">
    <div class="pc-scroll" id="planCard">
      <!-- Default: topic input -->
      <div class="ps">
        <div class="ps-label">Goal</div>
        <textarea class="tv-ta" id="topicIn" style="min-height:60px;font-size:0.82rem" placeholder="Describe your goal..." oninput="document.getElementById('btnGo').disabled=!this.value.trim()"></textarea>
      </div>
    </div>
    <div class="pc-run">
      <button class="btn-run" id="btnGo" onclick="doSupervised()">Go</button>
      <button class="btn-run stop" id="btnRun" onclick="doRun()" style="display:none">Stop</button>
    </div>
  </div>
  <div class="out-area">
    <div class="out-tabs">
      <div class="otab on" data-p="output" onclick="switchTab(this)">Output</div>
      <div class="otab" data-p="diagram" onclick="switchTab(this)">Diagram</div>
    </div>
    <div class="opanel on" id="p-output">
      <div class="out" id="output"><div class="ph">Plan is ready. Press Run to start.</div></div>
      <div class="stats" id="statsBar" style="display:none"></div>
    </div>
    <div class="opanel" id="p-diagram">
      <div class="diag" id="diagArea"></div>
    </div>
  </div>
  <div class="hist" id="histPanel">
    <div style="padding:0.5rem 0.6rem;border-bottom:1px solid var(--b);font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--d)">History</div>
    <div id="histList" style="flex:1;overflow-y:auto"></div>
  </div>
</div>

<script>
const BASE=location.pathname.replace(/\/(app\/?)?$/,'');
const ALL_TOOLS=['Read','Write','Edit','Bash','Glob','Grep','WebSearch','WebFetch'];
const MC={opus:'#c084fc',sonnet:'#60a5fa',haiku:'#4ade80'};
const MODE_NAMES={supervised:'Supervised',discuss:'Discussion',pipeline:'Pipeline',parallel:'Parallel',consensus:'Consensus',custom:'Custom Workflow'};

// ── State ──
let S={
  phase:'topic', // topic|planning|plan-ready|running|done
  topic:'',
  plan:null, // {mode,reasoning,agents[],options:{rounds,steps[],tasks[]}}
  agents:{}, // global registry
  ws:null,
  agentActivity:{},
};

// ── Phase transitions ──
function setPhase(p){
  S.phase=p;
  document.body.className=p==='choose'?'st-choose':'';
  // Toggle Go/Stop buttons
  document.getElementById('btnGo').style.display=(p==='running')?'none':'block';
  document.getElementById('btnRun').style.display=(p==='running')?'block':'none';
  renderPlan();
}

// ── Init ──
async function init(){
  const d=await(await fetch(BASE+'/api/config')).json();
  S.agents=d.agents;
  setInterval(pollActivity,3000);
  // Check for running job — reconnect if found
  try{
    const cur=await(await fetch(BASE+'/api/jobs/current')).json();
    if(cur.status==='running'&&cur.id){
      S.topic=cur.goal||'';
      S.plan={mode:'supervised',reasoning:'Reconnecting...',agents:[],options:{}};
      document.getElementById('output').innerHTML='';
      setPhase('running');
      attachToJob(cur.id);
      return;
    }
  }catch(e){}
}

// ── PLAN ──
let planVariants=[];
let taskAnalysis=null;

async function doPlan(retryCount=0){
  const maxRetries=2;
  const topic=document.getElementById('topicIn').value.trim();
  if(!topic)return;
  S.topic=topic;
  const btn=document.getElementById('btnPlan');
  btn.disabled=true;
  btn.textContent=retryCount?`Retrying (${retryCount}/${maxRetries})...`:'Planning...';
  try{
    const r=await fetch(BASE+'/api/auto-plans',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic})});
    const text=await r.text();
    let data;
    try{data=JSON.parse(text)}catch(pe){
      if(retryCount<maxRetries){btn.textContent='Retrying...';return doPlan(retryCount+1)}
      alert('Invalid response');btn.disabled=false;btn.textContent='Plan';return;
    }
    if(data.error){
      if(retryCount<maxRetries){btn.textContent='Retrying...';return doPlan(retryCount+1)}
      alert('Error: '+data.error);btn.disabled=false;btn.textContent='Plan';return;
    }
    if(data.plans){
      taskAnalysis=data.analysis||null;
      planVariants=data.plans;
    }else if(Array.isArray(data)){
      taskAnalysis=null;
      planVariants=data;
    }else{
      if(retryCount<maxRetries){btn.textContent='Retrying...';return doPlan(retryCount+1)}
      alert('Unexpected response');btn.disabled=false;btn.textContent='Plan';return;
    }
    const recIdx=planVariants.findIndex(p=>p.recommended);
    if(recIdx>=0){
      await pickVariant(recIdx);
    }else{
      renderVariants();
      setPhase('choose');
    }
  }catch(e){
    if(retryCount<maxRetries){return doPlan(retryCount+1)}
    btn.textContent='Self-repairing...';
    await selfRepair(e.message,'doPlan: '+topic);
    btn.disabled=false;btn.textContent='Plan';
  }
  btn.disabled=false;btn.textContent='Plan';
}

async function selfRepair(error,context){
  try{
    const r=await fetch(BASE+'/api/self-repair',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error,context})});
    const d=await r.json();
    if(d.ok){
      // Wait for service restart
      await new Promise(r=>setTimeout(r,3000));
      // Reload page to get fixed code
      location.reload();
    }
  }catch(e){}
}

function renderVariants(){
  document.getElementById('cvTopic').textContent=S.topic;
  const grid=document.getElementById('cvGrid');
  const colors=['var(--g)','var(--bl)','var(--a)','var(--o)','var(--p)'];
  // Find recommended variant (marked by AI or default to middle)
  const recIdx=planVariants.findIndex(p=>p.recommended);
  const bestIdx=recIdx>=0?recIdx:Math.min(2,planVariants.length-1);
  grid.innerHTML=planVariants.map((p,i)=>{
    const ags=(p.agents||[]);
    const mode=MODE_NAMES[p.mode]||p.mode;
    const isRec=i===bestIdx;
    return `<div class="cv-card${isRec?' recommended':''}" onclick="pickVariant(${i})">
      <div class="cv-num" style="color:${colors[i]||'var(--d)'}">${i+1}</div>
      <div class="cv-body">
        <div class="cv-label" style="color:${colors[i]||'var(--t)'}">${esc(p.label||'Plan '+(i+1))}${isRec?'<span class="cv-rec">optimal</span>':''}</div>
        <div class="cv-desc">${esc(p.description||p.reasoning||'')}</div>
      </div>
      <div class="cv-right">
        <div class="cv-meta">${mode}<br>${ags.length} agents</div>
        <div class="cv-agents">${ags.slice(0,4).map(a=>`<span class="cv-ag">${esc(a.display_name)}</span>`).join('')}${ags.length>4?`<span class="cv-ag">+${ags.length-4}</span>`:''}</div>
      </div>
    </div>`;
  }).join('');
}

async function pickVariant(idx){
  const plan=planVariants[idx];
  // Create missing agents
  for(const ag of plan.agents||[]){
    if(!S.agents[ag.id])await fetch(BASE+'/api/agents/'+ag.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ag)});
  }
  const d=await(await fetch(BASE+'/api/config')).json();S.agents=d.agents;
  S.plan=plan;
  S.plan.options=S.plan.options||{};
  setPhase('plan-ready');
}

function goManual(){
  S.topic=document.getElementById('topicIn').value.trim();
  S.plan={mode:'discuss',reasoning:'',agents:[],options:{rounds:2}};
  setPhase('plan-ready');
}

// ── RENDER PLAN CARD ──
function renderPlan(){
  if(S.phase==='topic'||!S.plan)return;
  const P=S.plan;
  const el=document.getElementById('planCard');
  const readonly=S.phase==='running';

  let h='';
  // Topic
  h+=`<div class="ps"><div class="ps-label">Topic</div><div class="pc-topic" onclick="if('${S.phase}'!=='running')editTopic()">${esc(S.topic)}</div></div>`;
  // Reasoning
  // Task analysis
  if(taskAnalysis){
    const a=taskAnalysis;
    let ah=`<div class="ps"><div class="ps-label">Task Analysis <span style="font-size:0.55rem;color:var(--d);cursor:pointer" onclick="this.parentElement.parentElement.querySelector('.ta-body').style.display=this.parentElement.parentElement.querySelector('.ta-body').style.display==='none'?'block':'none'">▼</span></div><div class="ta-body" style="display:block">`;
    if(a.understood_task)ah+=`<div class="pc-reason" style="margin-bottom:0.4rem"><strong style="color:var(--t)">${esc(a.understood_task)}</strong></div>`;
    if(a.phases&&a.phases.length){
      ah+=`<div style="display:flex;flex-wrap:wrap;gap:0.2rem;margin-bottom:0.4rem">`;
      a.phases.forEach((p,i)=>ah+=`<span style="padding:0.15rem 0.4rem;font-size:0.62rem;background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--a)">${i+1}. ${esc(p)}</span>`);
      ah+=`</div>`;
    }
    if(a.complexity)ah+=`<span style="font-size:0.6rem;color:var(--d);font-family:'JetBrains Mono',monospace">complexity: ${esc(a.complexity)}</span>`;
    ah+=`</div></div>`;
    h+=ah;
  }
  if(P.reasoning)h+=`<div class="ps"><div class="ps-label">Plan Reasoning</div><div class="pc-reason">${esc(P.reasoning)}</div></div>`;
  // Mode
  h+=`<div class="ps"><div class="ps-label">Mode</div><div class="mode-badge"><select class="mode-sel" onchange="S.plan.mode=this.value;renderPlan()">${Object.entries(MODE_NAMES).map(([k,v])=>`<option value="${k}" ${P.mode===k?'selected':''}>${v}</option>`).join('')}</select></div></div>`;
  // Agents
  h+=`<div class="ps"><div class="ps-label">Agents (${P.agents.length})</div>`;
  P.agents.forEach((a,i)=>{
    const mc=MC[a.model]||'#a1a1aa';
    const st=S.agentActivity[a.display_name]||'off';
    const dotCl=st==='working'?'background:var(--y);animation:pulse 1.5s infinite':st==='idle'?'background:var(--g)':'background:#3f3f46';
    h+=`<div class="ag-card" id="ag-${i}">
      <div class="ag-head" onclick="document.getElementById('ag-${i}').classList.toggle('open')">
        <span class="ag-dot" style="${dotCl}"></span>
        <span class="ag-name">${esc(a.display_name)}</span>
        <span class="ag-mtag" style="color:${mc}">${a.model}</span>
        <span class="ag-x" onclick="event.stopPropagation();S.plan.agents.splice(${i},1);renderPlan()">&times;</span>
        <span class="ag-chev">&#9660;</span>
      </div>
      <div class="ag-body">
        <div class="ag-row"><label>System Prompt</label><textarea oninput="S.plan.agents[${i}].system_prompt=this.value">${esc(a.system_prompt||'')}</textarea></div>
        <div class="ag-row"><label>Model</label><select onchange="S.plan.agents[${i}].model=this.value;renderPlan()"><option ${a.model==='opus'?'selected':''}>opus</option><option ${a.model==='sonnet'?'selected':''}>sonnet</option><option ${a.model==='haiku'?'selected':''}>haiku</option></select></div>
        <div class="ag-row"><label>Tools</label><div class="ag-tools">${ALL_TOOLS.map(t=>`<div class="ag-tool ${(a.allowed_tools||[]).includes(t)?'on':''}" onclick="toggleTool(${i},'${t}')">${t}</div>`).join('')}</div></div>
        <div class="ag-row"><label>Max Turns</label><input type="number" value="${a.max_turns||50}" onchange="S.plan.agents[${i}].max_turns=parseInt(this.value)" style="width:60px"></div>
      </div>
    </div>`;
  });
  h+=`<div class="add-ag"><input id="addAgIn" placeholder="Role name (e.g. Data Analyst)..." onkeydown="if(event.key==='Enter')addAgent()"><button onclick="addAgent()" id="addAgBtn">+ Add</button></div>`;
  h+=`</div>`;
  // Mode options
  h+=`<div class="ps"><div class="ps-label">Options</div>`;
  if(P.mode==='pipeline'){
    const steps=P.options.steps||[];
    steps.forEach((s,i)=>{
      h+=`<div class="opt-step"><select onchange="S.plan.options.steps[${i}].agent=this.value">${agOpts(s.agent)}</select><span style="color:var(--d);font-size:0.7rem">→</span><input value="${esc(s.action||'')}" placeholder="action..." onchange="S.plan.options.steps[${i}].action=this.value"><span class="opt-x" onclick="S.plan.options.steps.splice(${i},1);renderPlan()">×</span></div>`;
    });
    h+=`<span class="opt-add" onclick="if(!S.plan.options.steps)S.plan.options.steps=[];S.plan.options.steps.push({agent:S.plan.agents[0]?.id||'',action:''});renderPlan()">+ step</span>`;
  }else if(P.mode==='parallel'){
    const tasks=P.options.tasks||[];
    tasks.forEach((t,i)=>{
      h+=`<div class="opt-step"><select onchange="S.plan.options.tasks[${i}].agent=this.value">${agOpts(t.agent)}</select><input value="${esc(t.description||'')}" placeholder="subtask..." onchange="S.plan.options.tasks[${i}].description=this.value"><span class="opt-x" onclick="S.plan.options.tasks.splice(${i},1);renderPlan()">×</span></div>`;
    });
    h+=`<span class="opt-add" onclick="if(!S.plan.options.tasks)S.plan.options.tasks=[];S.plan.options.tasks.push({agent:S.plan.agents[0]?.id||'',description:''});renderPlan()">+ task</span>`;
  }else if(P.mode==='custom'){
    const wf=P.options.workflow||[];
    wf.forEach((st,i)=>{
      const stAgents=(st.agents||[]).join(', ');
      h+=`<div style="margin-bottom:0.4rem;padding:0.4rem 0.5rem;background:var(--bg);border:1px solid var(--b);border-radius:4px">
        <div style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem">
          <span style="color:var(--a);font-weight:600">Stage ${i+1}</span>
          <span style="color:var(--d2)">${esc(st.type||'')}</span>
          <span style="color:var(--d);font-size:0.6rem;flex:1">${esc(stAgents)}</span>
          <span class="opt-x" onclick="S.plan.options.workflow.splice(${i},1);renderPlan()">×</span>
        </div>
        ${st.task?`<div style="font-size:0.65rem;color:var(--d);margin-top:2px">${esc(st.task)}</div>`:''}
        ${st.type==='loop'?`<div style="font-size:0.6rem;color:var(--y);margin-top:2px">↻ loop stage ${(st.target_stage||0)+1}, max ${st.max_iterations||3}x${st.criteria?' — '+esc(st.criteria):''}</div>`:''}
      </div>`;
    });
  }else{
    // No manual rounds control — supervisor decides
  }
  h+=`</div>`;
  el.innerHTML=h;
  drawDiagram();
}

function editTopic(){
  const el=document.querySelector('.pc-topic');
  if(!el)return;
  const ta=document.createElement('textarea');
  ta.className='pc-topic-edit';ta.value=S.topic;
  ta.onblur=function(){S.topic=this.value;renderPlan()};
  ta.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this.blur()}};
  el.replaceWith(ta);ta.focus();
}

function toggleTool(agIdx,tool){
  const a=S.plan.agents[agIdx];
  if(!a.allowed_tools)a.allowed_tools=[];
  const idx=a.allowed_tools.indexOf(tool);
  if(idx>=0)a.allowed_tools.splice(idx,1);else a.allowed_tools.push(tool);
  renderPlan();
}

function agOpts(sel){
  return S.plan.agents.map(a=>`<option value="${a.id}" ${a.id===sel?'selected':''}>${a.display_name}</option>`).join('');
}

// ── ADD AGENT ──
async function addAgent(){
  const inp=document.getElementById('addAgIn');
  const btn=document.getElementById('addAgBtn');
  const name=inp.value.trim();if(!name)return;
  btn.disabled=true;btn.textContent='...';
  try{
    const r=await fetch(BASE+'/api/agents/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role_name:name})});
    const ag=await r.json();
    if(ag.error){btn.textContent='+ Add';btn.disabled=false;return}
    // Save to backend
    await fetch(BASE+'/api/agents/'+ag.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ag)});
    const d=await(await fetch(BASE+'/api/config')).json();S.agents=d.agents;
    S.plan.agents.push(ag);
    inp.value='';
    renderPlan();
  }catch(e){}
  btn.textContent='+ Add';btn.disabled=false;
}

// ── RUN ──
async function doSupervised(){
  const topic=document.getElementById('topicIn').value.trim();
  if(!topic)return;
  S.topic=topic;
  S.plan={mode:'supervised',reasoning:'Supervisor controls all stages',agents:[],options:{}};
  document.getElementById('output').innerHTML='';
  document.getElementById('statsBar').style.display='none';
  setPhase('running');
  connectWS({action:'start',topic});
}

function attachToJob(jobId){
  connectWS({action:'attach',job_id:jobId});
}

function connectWS(msg){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  S.ws=new WebSocket(`${proto}//${location.host}${BASE}/ws/run`);
  S.ws.onopen=()=>{S.ws.send(JSON.stringify(msg))};
  S.ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='job_created'){
      S.currentJobId=d.job_id;
    }else if(d.type==='update'){
      addCard(d.agent,d.event,d.text);
      if(d.event==='start')S.agentActivity[d.agent]='working';
      else if(d.event==='done'||d.event==='error')S.agentActivity[d.agent]='idle';
      drawDiagram();
    }else if(d.type==='result'){
      if(d.summary)addSum(d.summary);showStats(d);fin();
    }else if(d.type==='error'){
      // Not fatal for background jobs — just show the error
      addCard('Error','error',d.text);
      if(d.text&&!d.text.includes('already running'))fin();
    }
  };
  // WS disconnect doesn't stop the job — it continues in background
  S.ws.onclose=()=>{
    S.ws=null;
    // Don't call fin() — job is still running on server
  };
  S.ws.onerror=()=>{S.ws=null};
}

async function doRun(){
  if(S.phase==='running'){
    // Stop job on server
    if(S.currentJobId){
      fetch(BASE+'/api/jobs/'+S.currentJobId+'/stop',{method:'POST'}).catch(()=>{});
    }
    if(S.ws){S.ws.onclose=null;S.ws.onerror=null;S.ws.onmessage=null;S.ws.close();S.ws=null}
    fin();addCard('System','error','Stopped');return;
  }
  if(!S.plan||!S.plan.agents.length)return;
  document.getElementById('output').innerHTML='';
  document.getElementById('statsBar').style.display='none';
  switchTab(document.querySelector('[data-p="output"]'));
  setPhase('running');

  // Ensure agents exist on backend
  for(const ag of S.plan.agents){
    await fetch(BASE+'/api/agents/'+ag.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ag)});
  }

  const proto=location.protocol==='https:'?'wss:':'ws:';
  S.ws=new WebSocket(`${proto}//${location.host}${BASE}/ws/run`);
  S.ws.onopen=()=>{
    S.ws.send(JSON.stringify({
      mode:S.plan.mode,
      topic:S.topic,
      agents:S.plan.agents.map(a=>a.id),
      options:S.plan.options,
    }));
  };
  S.ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='update'){
      addCard(d.agent,d.event,d.text);
      if(d.event==='start')S.agentActivity[d.agent]='working';
      else if(d.event==='done'||d.event==='error')S.agentActivity[d.agent]='idle';
      drawDiagram();
    }else if(d.type==='result'){
      if(d.summary)addSum(d.summary);showStats(d);fin();
    }else if(d.type==='error'){addCard('Error','error',d.text);selfRepair(d.text,'ws run: '+S.topic);fin()}
  };
  S.ws.onclose=()=>{if(S.phase==='running')fin()};
  S.ws.onerror=()=>{addCard('Error','error','Connection failed');fin()};
}

function fin(){
  S.agentActivity={};S.ws=null;
  setPhase('done');
}

// ── RESET ──
function fullReset(){
  if(S.currentJobId){
    fetch(BASE+'/api/jobs/'+S.currentJobId+'/stop',{method:'POST'}).catch(()=>{});
  }
  if(S.ws){S.ws.onclose=null;S.ws.close();S.ws=null}
  S.plan=null;S.topic='';S.agentActivity={};S.currentJobId=null;
  document.getElementById('topicIn').value='';
  document.getElementById('output').innerHTML='<div class="ph">Enter a goal and press Go</div>';
  document.getElementById('statsBar').style.display='none';
  setPhase('topic');
}

// ── OUTPUT HELPERS ──
function addCard(ag,ev,txt){
  const out=document.getElementById('output');
  const cid='a-'+ag.replace(/\s/g,'');

  if(ev==='start'){
    const c=document.createElement('div');c.className='rc ev-start';c.id=cid;
    c.innerHTML=`<div class="rc-h"><span class="al">${esc(ag)}</span><span class="el">${esc(txt)}</span><div class="spinner"></div></div><div class="rc-b rc-live" style="font-size:0.7rem;color:var(--d);max-height:150px;overflow-y:auto"></div>`;
    out.appendChild(c);out.scrollTop=out.scrollHeight;return;
  }

  if(ev==='progress'){
    // Live update — append to active card
    const active=document.getElementById(cid);
    if(active){
      const live=active.querySelector('.rc-live');
      if(live){
        live.innerHTML=fmtMd(txt);
        live.scrollTop=live.scrollHeight;
        out.scrollTop=out.scrollHeight;
      }
    }
    return;
  }

  // done/error — replace active card with final
  const a=document.getElementById(cid);if(a)a.remove();
  const c=document.createElement('div');c.className=`rc ev-${ev}`;
  c.innerHTML=`<div class="rc-h"><span class="al">${esc(ag)}</span><span class="el">${ev}</span></div><div class="rc-b">${fmtMd(txt)}</div>`;
  out.appendChild(c);out.scrollTop=out.scrollHeight;
}
function addSum(txt){const out=document.getElementById('output');const c=document.createElement('div');c.className='rc sc';c.innerHTML=`<div class="rc-h"><span class="al">Summary</span></div><div class="rc-b">${fmtMd(txt)}</div>`;out.appendChild(c);out.scrollTop=out.scrollHeight}
function showStats(d){const b=document.getElementById('statsBar');b.style.display='block';b.textContent=`${d.responses} responses | $${(d.cost||0).toFixed(4)} | ${((d.duration_ms||0)/1000).toFixed(1)}s`}

// ── TABS ──
function switchTab(el){document.querySelectorAll('.otab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.opanel').forEach(p=>p.classList.remove('on'));el.classList.add('on');document.getElementById('p-'+el.dataset.p).classList.add('on');if(el.dataset.p==='diagram')drawDiagram()}

// ── DIAGRAM ──
function drawDiagram(){
  const area=document.getElementById('diagArea');
  if(!S.plan||!S.plan.agents.length){area.innerHTML='<div class="ph">No agents</div>';return}
  const ags=S.plan.agents,n=ags.length,W=600,H=400,cx=W/2,cy=H/2,R=140;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif">`;
  svg+=`<rect width="${W}" height="${H}" fill="#111113" rx="8"/>`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="28" fill="#18181b" stroke="#818cf8" stroke-width="1.5"/>`;
  svg+=`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#818cf8" font-size="9" font-weight="600">Coordinator</text>`;
  svg+=`<text x="${cx}" y="24" text-anchor="middle" fill="#71717a" font-size="10">${MODE_NAMES[S.plan.mode]||S.plan.mode}</text>`;
  ags.forEach((a,i)=>{
    const angle=(2*Math.PI*i/n)-Math.PI/2;
    const x=cx+R*Math.cos(angle),y=cy+R*Math.sin(angle);
    const st=S.agentActivity[a.display_name]||'off';
    const mc=MC[a.model]||'#a1a1aa';
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${st==='working'?'#fbbf24':'#27272a'}" stroke-width="${st==='working'?1.5:0.8}"/>`;
    svg+=`<circle cx="${x}" cy="${y}" r="24" fill="#18181b" stroke="${st==='working'?'#fbbf24':mc}" stroke-width="${st==='working'?2:1}"/>`;
    if(st==='working')svg+=`<circle cx="${x}" cy="${y}" r="24" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"><animate attributeName="r" from="24" to="32" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.3" to="0" dur="1.5s" repeatCount="indefinite"/></circle>`;
    svg+=`<text x="${x}" y="${y-3}" text-anchor="middle" fill="#e4e4e7" font-size="8.5" font-weight="500">${a.display_name}</text>`;
    svg+=`<text x="${x}" y="${y+8}" text-anchor="middle" fill="${mc}" font-size="6.5" font-family="JetBrains Mono,monospace">${a.model}</text>`;
    const dc=st==='working'?'#fbbf24':st==='idle'?'#4ade80':'#3f3f46';
    svg+=`<circle cx="${x+16}" cy="${y-16}" r="3.5" fill="${dc}"/>`;
  });
  svg+=`</svg>`;area.innerHTML=svg;
}

async function pollActivity(){
  try{
    const d=await(await fetch(BASE+'/api/activity')).json();
    const changed=JSON.stringify(d)!==JSON.stringify(S.agentActivity);
    S.agentActivity=d;
    if(changed){renderPlan();drawDiagram()}
  }catch(e){}
}

// ── HISTORY ──
let histOpen=false;
function toggleHist(){histOpen=!histOpen;document.getElementById('histPanel').classList.toggle('open',histOpen);document.getElementById('histBtn').classList.toggle('on',histOpen);if(histOpen)loadHist()}
async function loadHist(){
  const runs=await(await fetch(BASE+'/api/history')).json();
  document.getElementById('histList').innerHTML=runs.length?runs.map(r=>`<div class="hi" onclick="loadRun('${r.id}')"><div class="hm">${r.mode}</div><div class="ht">${esc(r.topic||'')}</div><div class="hx">${r.agents?.length||0}ag $${(r.cost||0).toFixed(3)}</div></div>`).join(''):'<div style="padding:1rem;color:var(--d);font-size:0.75rem">No runs</div>';
}
async function loadRun(id){
  const r=await(await fetch(BASE+'/api/history/'+id)).json();if(r.error)return;
  switchTab(document.querySelector('[data-p="output"]'));
  const out=document.getElementById('output');out.innerHTML='';
  if(r.transcript){const c=document.createElement('div');c.className='rc ev-done';c.innerHTML=`<div class="rc-h"><span class="al">${r.mode} run</span><span class="el">${id}</span></div><div class="rc-b">${fmtMd(r.transcript)}</div>`;out.appendChild(c)}
  if(r.summary)addSum(r.summary);
  document.getElementById('statsBar').style.display='block';
  document.getElementById('statsBar').textContent=`${r.responses||0} responses | $${(r.cost||0).toFixed(4)} | ${((r.duration_ms||0)/1000).toFixed(1)}s`;
}

// ── HELPERS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtMd(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px;font-size:.78em">$1</code>').replace(/^### (.+)$/gm,'<strong style="color:var(--t);font-size:.85rem">$1</strong>').replace(/^## (.+)$/gm,'<strong style="color:var(--t);font-size:.9rem">$1</strong>').replace(/^- (.+)$/gm,'&nbsp;&nbsp;&#8226; $1').replace(/\n/g,'<br>')}

init();
