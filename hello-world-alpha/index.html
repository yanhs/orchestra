<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hello World — Команда Альфа" />
  <title>Hello World · Команда Альфа</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Corner decorators -->
  <div class="corner corner--tl" aria-hidden="true"></div>
  <div class="corner corner--tr" aria-hidden="true"></div>
  <div class="corner corner--bl" aria-hidden="true"></div>
  <div class="corner corner--br" aria-hidden="true"></div>

  <!-- Main content -->
  <main class="container">

    <!-- Status badge -->
    <div class="badge" aria-label="Статус команды">
      <span class="badge-dot" aria-hidden="true"></span>
      Alpha Team · Active
    </div>

    <!-- Hero heading with gradient + fadeIn + scale animation -->
    <h1 class="heading">Hello World</h1>

    <!-- Animated divider -->
    <hr class="divider" aria-hidden="true" />

    <!-- Subtitle -->
    <p class="subtitle">
      <span>Команда Альфа</span>
    </p>

  </main>

  <!-- Bottom indicator -->
  <div class="indicator" aria-hidden="true">
    <div class="indicator-line"></div>
    <span class="indicator-text">v1.0.0</span>
    <div class="indicator-line"></div>
  </div>

</body>
</html>
